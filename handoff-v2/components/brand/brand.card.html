<!-- @dsCard group="Components" viewport="700x340" name="Brand primitives" subtitle="Logo, thread, loader, folio, pearl" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); }
  .wrap { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px 40px; align-items: center; }
  .cell { display: flex; flex-direction: column; gap: 12px; }
  .cap { font-family: var(--pl-font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--pl-muted); }
  .row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
  const { PearloomLogo, PearloomGlyph, Thread, WeaveLoader, Folio, Pearl } = window.PearloomDesignSystem_55118c;
  function Cell({ cap, children }) {
    return <div className="cell"><div className="cap">{cap}</div><div className="row">{children}</div></div>;
  }
  function Demo() {
    return (
      <>
        <Cell cap="Logo lockup"><PearloomLogo size={30} /></Cell>
        <Cell cap="Glyph · the woven pear"><PearloomGlyph size={48} /><PearloomGlyph size={28} /></Cell>
        <div className="cell" style={{ gridColumn: '1 / -1' }}>
          <div className="cap">Thread — weave · straight · single · bullet</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 24, alignItems: 'center' }}>
            <Thread /><Thread variant="straight" /><Thread variant="single" /><Thread variant="bullet" height={16} />
          </div>
        </div>
        <Cell cap="WeaveLoader"><WeaveLoader size="md" label="Threading…" /><WeaveLoader size="sm" inline /></Cell>
        <Cell cap="Folio · Pearl"><Folio kicker="Edition" no={3} label="Day-of" /><Pearl size={12} /><Pearl size={12} iridescent /></Cell>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
