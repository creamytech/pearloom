<!-- @dsCard group="Components" viewport="700x440" name="Core UI" subtitle="Buttons, badges, card, field, eyebrow" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); }
  .wrap { padding: 26px 30px; display: flex; flex-direction: column; gap: 22px; }
  .cap { font-family: var(--pl-font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--pl-muted); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .cols { display: grid; grid-template-columns: 1.3fr 1fr; gap: 26px; align-items: start; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
  const NS = window.PearloomDesignSystem_55118c;
  const { Button, Badge, Card, Field, Eyebrow, Pearl } = NS;
  function Demo() {
    return (
      <>
        <div>
          <div className="cap">Buttons</div>
          <div className="row">
            <Button variant="pearl">Begin a thread <Pearl size={8} /></Button>
            <Button variant="ink">Press publish</Button>
            <Button variant="olive">Set the type</Button>
            <Button variant="terra">Send</Button>
            <Button variant="ghost">Cancel</Button>
            <Button variant="paper" size="sm">Small</Button>
          </div>
        </div>
        <div>
          <div className="cap">Badges</div>
          <div className="row">
            <Badge tone="olive">Live</Badge>
            <Badge tone="gold">Pressed</Badge>
            <Badge tone="plum">Destructive</Badge>
            <Badge tone="neutral">Draft</Badge>
            <Badge tone="olive" variant="pill" dot>Threading</Badge>
            <Badge tone="ink" variant="pill">Pro</Badge>
          </div>
        </div>
        <div className="cols">
          <div>
            <div className="cap">Field</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <Field label="Your names" defaultValue="Mira & Jun" />
              <Field label="A note to guests" multiline rows={2} placeholder="Come as you are…" hint="Pear will polish it later." />
            </div>
          </div>
          <div>
            <div className="cap">Card · Eyebrow</div>
            <Card padding={20}>
              <Eyebrow>The three acts</Eyebrow>
              <div className="pl-display" style={{ fontSize: 28, marginTop: 10 }}>Woven in an afternoon</div>
              <p className="pl-body" style={{ fontSize: 13.5, margin: '8px 0 0' }}>Answer three questions, hand over a few photos.</p>
            </Card>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
