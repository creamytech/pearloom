<!-- @dsCard group="Auth" viewport="1240x780" name="Sign in" subtitle="Faithful SigninV8 recreation — split form + floating collage, on the real .pl8 chrome" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Pearloom</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; min-height: 100%; background: var(--cream); overflow-x: hidden; }
  .pl8 { font-family: var(--pl-font-body); color: var(--ink); }
  .display { font-family: var(--pl-font-display); font-weight: 600; letter-spacing: -0.02em; }
  .display-italic { font-family: var(--pl-font-display); font-style: italic; font-weight: 400; letter-spacing: -0.02em; }
  .signin-root { max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 80px); padding: 100px 56px 40px; position: relative; z-index: 2; display: grid; grid-template-columns: 420px 1fr; gap: 60px; align-items: center; }
  input { font-family: inherit; }
  input:focus { border-color: var(--pl-olive) !important; box-shadow: 0 0 0 3px rgba(92,107,63,0.16); }
  .gbtn:hover { background: var(--cream-2) !important; }
  @keyframes fl { 0%,100% { transform: translateY(0) rotate(var(--r,0deg)); } 50% { transform: translateY(-10px) rotate(var(--r,0deg)); } }
  .float { animation: fl var(--d,7s) ease-in-out infinite; }
  @keyframes draw { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
  @media (prefers-reduced-motion: reduce) { .float { animation: none; } }
  .pl-theme-toggle { position: fixed; bottom: 16px; right: 16px; z-index: 9000; display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 999px; border: 1px solid var(--line); background: var(--pl-glass); backdrop-filter: blur(12px); color: var(--ink); font-family: var(--pl-font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; box-shadow: var(--pl-shadow-sm); }
  .meta-row { margin: 16px auto 0; max-width: 1200px; display: flex; justify-content: center; gap: 36px; font-size: 12.5px; color: var(--ink-soft); flex-wrap: wrap; padding: 0 56px 30px; }
  .meta-row span { display: inline-flex; align-items: center; gap: 6px; }
  @media (max-width: 860px) {
    .signin-root { grid-template-columns: 1fr; gap: 36px; padding: 88px 24px 120px; }
    .collage { display: none !important; }
    .meta-row { gap: 16px; font-size: 11.5px; }
  }
</style>
</head>
<body>
<div class="pl8" id="root"></div>
<button class="pl-theme-toggle" id="themeToggle">◐ <span id="themeLabel">Dark</span></button>
<script>
  (function(){ var root=document.documentElement; var saved=localStorage.getItem('pl-theme')||'light';
    function apply(t){ root.setAttribute('data-theme',t); var l=document.getElementById('themeLabel'); if(l) l.textContent=t==='dark'?'Light':'Dark'; }
    apply(saved); document.getElementById('themeToggle').addEventListener('click',function(){ var n=root.getAttribute('data-theme')==='dark'?'light':'dark'; localStorage.setItem('pl-theme',n); apply(n); });
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
const NS = window.PearloomDesignSystem_55118c;
const { PearloomLogo, PearloomGlyph, Pearl, Monogram, Divider, Motif } = NS;

/* ── Pear, the in-house planner — a friendly pear glyph, tone-able ── */
function Pear({ size = 56, tone = 'sage' }) {
  const map = { sage: 'var(--sage)', cream: 'var(--pl-olive-mist)', peach: 'var(--peach-2)' };
  const c = map[tone] || map.sage;
  return (
    <svg width={size} height={size} viewBox="0 0 60 64" aria-hidden="true">
      <path d="M30 20 C 20 20, 14 30, 16 42 C 18 54, 26 60, 30 60 C 34 60, 42 54, 44 42 C 46 30, 40 20, 30 20 Z" fill={c} stroke="var(--pl-olive-deep)" strokeWidth="1.5" />
      <path d="M30 20 C 30 14, 31 9, 35 5" fill="none" stroke="var(--pl-olive-deep)" strokeWidth="1.6" strokeLinecap="round" />
      <path d="M35 5 C 39 1, 46 1.5, 49 6 C 45 11, 38 10.5, 35 5 Z" fill="var(--sage)" stroke="var(--pl-olive-deep)" strokeWidth="1.2" />
      <circle cx="24" cy="40" r="2.4" fill="var(--pl-olive-deep)" />
      <circle cx="36" cy="40" r="2.4" fill="var(--pl-olive-deep)" />
      <path d="M25 47 q 5 4 10 0" fill="none" stroke="var(--pl-olive-deep)" strokeWidth="1.6" strokeLinecap="round" />
      <circle cx="19" cy="45" r="2.6" fill="var(--peach-2)" opacity="0.6" />
      <circle cx="41" cy="45" r="2.6" fill="var(--peach-2)" opacity="0.6" />
    </svg>
  );
}
function Sparkle({ size = 16, style }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" style={style} aria-hidden="true"><path d="M12 2 C 12.5 8, 16 11.5, 22 12 C 16 12.5, 12.5 16, 12 22 C 11.5 16, 8 12.5, 2 12 C 8 11.5, 11.5 8, 12 2 Z" fill="var(--pl-gold)" /></svg>;
}
function Blob({ tone, size, opacity, style }) {
  const map = { cream: 'var(--pl-olive-mist)', sage: 'var(--sage-tint)', peach: 'var(--peach-bg)' };
  return <div style={{ width: size, height: size, borderRadius: '47% 53% 44% 56% / 54% 48% 52% 46%', background: map[tone], opacity, filter: 'blur(2px)', ...style }} aria-hidden="true" />;
}
function Stamp({ size = 84, tone = 'sage', text, rotation = 0, icon = 'pear' }) {
  const map = { sage: 'var(--sage)', peach: 'var(--peach-2)', cream: 'var(--pl-stone)' };
  const c = map[tone];
  const id = 'st' + Math.random().toString(36).slice(2, 7);
  return (
    <div style={{ width: size, height: size, transform: `rotate(${rotation}deg)`, position: 'relative' }} aria-hidden="true">
      <svg width={size} height={size} viewBox="0 0 100 100">
        <defs><path id={id} d="M50 50 m -38 0 a 38 38 0 1 1 76 0 a 38 38 0 1 1 -76 0" /></defs>
        <circle cx="50" cy="50" r="46" fill="none" stroke={c} strokeWidth="1.5" strokeDasharray="2 3" />
        <circle cx="50" cy="50" r="30" fill="none" stroke={c} strokeWidth="1" />
        <text fill={c} fontSize="7.2" fontFamily="var(--pl-font-mono)" letterSpacing="1.2" fontWeight="600">
          <textPath href={'#' + id} startOffset="0%">{text + ' · ' + text}</textPath>
        </text>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center' }}>
        {icon === 'heart'
          ? <svg width="26" height="26" viewBox="0 0 32 32"><path d="M16 27 C 4 18, 6 7, 13 9 C 15 9.6, 16 11, 16 12 C 16 11, 17 9.6, 19 9 C 26 7, 28 18, 16 27 Z" fill="none" stroke={c} strokeWidth="1.6" /></svg>
          : <PearloomGlyph size={26} color={c} gold={c} paper="transparent" />}
      </div>
    </div>
  );
}
function TinyIcon({ name, size = 13 }) {
  const p = { fill: 'none', stroke: 'currentColor', strokeWidth: 1.6, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const d = {
    lock: <g {...p}><rect x="5" y="11" width="14" height="9" rx="2" /><path d="M8 11 V8 a4 4 0 0 1 8 0 v3" /></g>,
    leaf: <g {...p}><path d="M5 19 C 5 9, 13 5, 19 5 C 19 15, 13 19, 5 19 Z" /><path d="M5 19 C 9 14, 14 10, 18 7" /></g>,
    heart: <g {...p}><path d="M12 20 C 4 14, 5 7, 10 8 C 11.4 8.4, 12 9.6, 12 10.5 C 12 9.6, 12.6 8.4, 14 8 C 19 7, 20 14, 12 20 Z" /></g>,
    mail: <g {...p}><rect x="4" y="6" width="16" height="12" rx="2" /><path d="M5 8 l7 5 l7 -5" /></g>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">{d[name]}</svg>;
}
function GoogleGlyph() {
  return (
    <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
      <path fill="#4285F4" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C33.7 6 29.1 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.2-.1-2.4-.4-3.5z" />
      <path fill="#34A853" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3 0 5.7 1.1 7.8 3l5.7-5.7C33.7 6 29.1 4 24 4 16.3 4 9.6 8.4 6.3 14.7z" />
      <path fill="#FBBC05" d="M24 44c5 0 9.6-1.9 13.1-5.1l-6-5c-2 1.4-4.5 2.1-7.1 2.1-5.3 0-9.7-3.4-11.3-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z" />
      <path fill="#EA4335" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6 5c4.1-3.8 6.9-9.4 6.9-16.1 0-1.2-.1-2.4-.4-3.5z" />
    </svg>
  );
}

const field = { width: '100%', boxSizing: 'border-box', padding: '12px 16px 12px 42px', background: 'var(--card)', border: '1.5px solid var(--line)', borderRadius: 12, fontSize: 14, outline: 'none', color: 'var(--ink)' };
const lbl = { fontSize: 13, fontWeight: 600, color: 'var(--ink)', display: 'block', marginBottom: 6 };

function SignIn() {
  const [showPw, setShowPw] = React.useState(false);
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [busy, setBusy] = React.useState(null);
  const [err, setErr] = React.useState(null);

  const submit = (e) => {
    e.preventDefault();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr('Doesn’t look like an email address.'); return; }
    if (!password) { setErr('Enter your password — or use Google above.'); return; }
    setErr(null); setBusy('email');
    setTimeout(() => setBusy(null), 1400);
  };

  return (
    <>
      {/* logo */}
      <div style={{ position: 'absolute', top: 38, left: 56, zIndex: 10 }}>
        <a href="#" onClick={(e) => e.preventDefault()} style={{ textDecoration: 'none' }}><PearloomLogo size={24} /></a>
      </div>

      <div className="signin-root">
        {/* LEFT — form */}
        <div style={{ maxWidth: 420 }}>
          <Sparkle size={16} style={{ marginBottom: 8 }} />
          <h1 className="display" style={{ fontSize: 'clamp(38px,4.4vw,52px)', margin: '4px 0 0', lineHeight: 1.05 }}>Welcome</h1>
          <h1 className="display-italic" style={{ fontSize: 'clamp(38px,4.4vw,52px)', margin: '2px 0 20px', lineHeight: 1.1, color: 'var(--lavender-ink)' }}>
            back to the loom. <Pearl size={13} />
          </h1>
          <p style={{ color: 'var(--ink-soft)', fontSize: 15, marginBottom: 26, lineHeight: 1.5 }}>Every moment matters. Let&apos;s keep your story growing.</p>

          {err ? (
            <div style={{ marginBottom: 16, padding: '11px 15px', borderRadius: 12, background: 'var(--pl-warning-mist)', border: '1px solid var(--pl-warning)', color: 'var(--pl-warning)', fontSize: 13 }}>{err}</div>
          ) : null}

          <button type="button" className="gbtn" onClick={() => { setBusy('google'); setTimeout(() => setBusy(null), 1400); }} disabled={busy !== null}
            style={{ width: '100%', padding: '13px 18px', background: 'var(--card)', border: '1.5px solid var(--line)', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, fontWeight: 600, fontSize: 14, color: 'var(--ink)', cursor: busy ? 'wait' : 'pointer', fontFamily: 'var(--pl-font-body)' }}>
            <GoogleGlyph /> {busy === 'google' ? 'Opening Google…' : 'Continue with Google'}
          </button>

          <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '18px 0', color: 'var(--ink-muted)', fontSize: 13 }}>
            <div style={{ flex: 1, height: 1, background: 'var(--line)' }} /> or <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
          </div>

          <form onSubmit={submit}>
            <label htmlFor="em" style={lbl}>Email address</label>
            <div style={{ position: 'relative', marginBottom: 16 }}>
              <span style={{ position: 'absolute', left: 16, top: 13, color: 'var(--ink-muted)' }}><TinyIcon name="mail" size={16} /></span>
              <input id="em" type="email" autoComplete="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" style={field} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <label htmlFor="pw" style={{ ...lbl, marginBottom: 0 }}>Password</label>
              <a href="#" onClick={(e) => e.preventDefault()} style={{ fontSize: 13, color: 'var(--pl-olive)' }}>Forgot password?</a>
            </div>
            <div style={{ position: 'relative', marginBottom: 18 }}>
              <span style={{ position: 'absolute', left: 16, top: 13, color: 'var(--ink-muted)' }}><TinyIcon name="lock" size={16} /></span>
              <input id="pw" type={showPw ? 'text' : 'password'} autoComplete="current-password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Enter your password" style={{ ...field, padding: '12px 44px 12px 42px' }} />
              <button type="button" onClick={() => setShowPw((v) => !v)} aria-label={showPw ? 'Hide password' : 'Show password'} style={{ position: 'absolute', right: 12, top: 9, padding: 4, background: 'transparent', border: 'none', color: 'var(--ink-muted)', cursor: 'pointer', fontSize: 11, fontFamily: 'var(--pl-font-mono)', letterSpacing: '0.1em' }}>{showPw ? 'HIDE' : 'SHOW'}</button>
            </div>
            <button type="submit" disabled={busy !== null || !email.trim() || !password}
              style={{ width: '100%', justifyContent: 'center', display: 'inline-flex', alignItems: 'center', gap: 8, padding: '14px', borderRadius: 999, border: '1px solid var(--pl-gold-soft)', fontFamily: 'var(--pl-font-body)', fontWeight: 600, fontSize: 14, color: 'var(--pl-ink)', cursor: 'pointer', opacity: !email.trim() || !password ? 0.55 : 1, background: 'linear-gradient(135deg,#F4ECD8 0%,#E8C77A 32%,#D9A89E 58%,#B8C96B 82%,#F4ECD8 100%)' }}>
              {busy === 'email' ? 'Signing in…' : 'Sign in'} <Pearl size={9} />
            </button>
          </form>

          <div style={{ textAlign: 'center', marginTop: 18, fontSize: 13, color: 'var(--ink-soft)' }}>
            New to Pearloom? <a href="#" onClick={(e) => e.preventDefault()} style={{ color: 'var(--pl-olive)', fontWeight: 500 }}>Create an account</a>
          </div>

          {/* Pear chat bubble */}
          <div style={{ marginTop: 36, display: 'flex', gap: 12, alignItems: 'flex-end' }}>
            <Pear size={56} tone="sage" />
            <div style={{ background: 'var(--pl-olive-mist)', padding: '12px 16px', borderRadius: 14, borderBottomLeftRadius: 2, border: '1px solid var(--pl-olive-20)', maxWidth: 240, marginBottom: 8 }}>
              <div style={{ fontWeight: 600, color: 'var(--pl-olive-deep)', fontSize: 14, marginBottom: 2 }}>Hi there! I&apos;m Pear.</div>
              <div style={{ fontSize: 13, color: 'var(--ink-soft)', lineHeight: 1.4 }}>I&apos;m here to help you cherish what matters most. <Pearl size={10} /></div>
            </div>
          </div>
        </div>

        {/* RIGHT — collage */}
        <div className="collage" style={{ position: 'relative', height: 560 }}>
          <Blob tone="cream" size={320} opacity={0.85} style={{ position: 'absolute', top: 20, left: 40, zIndex: 0 }} />
          <Blob tone="sage" size={280} opacity={0.75} style={{ position: 'absolute', bottom: 60, right: -30, zIndex: 0 }} />
          <Blob tone="peach" size={260} opacity={0.7} style={{ position: 'absolute', bottom: 120, left: 100, zIndex: 0 }} />

          {/* quote card */}
          <div style={{ position: 'absolute', top: 60, left: 24, zIndex: 3 }}>
            <div className="float" style={{ '--r': '-4deg', '--d': '7s', width: 210, height: 280, background: 'var(--pl-olive-mist)', borderRadius: '3px 12px 12px 3px', boxShadow: '0 20px 40px rgba(61,74,31,0.16), inset 10px 0 0 rgba(0,0,0,0.08)', padding: '30px 26px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
              <div style={{ fontFamily: 'var(--pl-font-display)', fontStyle: 'italic', fontSize: 28, lineHeight: 1.12, color: 'var(--ink)' }}>The best memories come from being together.</div>
              <div style={{ textAlign: 'center' }}><Pear size={40} tone="sage" /></div>
            </div>
          </div>

          {/* save-the-date polaroid — uses the new Monogram */}
          <div style={{ position: 'absolute', top: 36, right: 16, width: 250, zIndex: 5 }}>
            <div className="float" style={{ '--r': '3deg', '--d': '6.4s' }}>
              <div style={{ background: '#fff', padding: 10, borderRadius: 14, boxShadow: '0 20px 40px rgba(61,74,31,0.2)', position: 'relative' }}>
                <div style={{ position: 'absolute', top: -12, right: 30, width: 80, height: 26, background: 'rgba(234,178,134,0.55)', transform: 'rotate(-3deg)' }} />
                <div className="pl-tx-linen" style={{ borderRadius: 8, background: '#FBF6EA', aspectRatio: '4/5', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '22px 16px', textAlign: 'center', '--surface-page': '#FBF6EA', '--tx-ink': 'rgba(46,107,138,0.12)' }}>
                  <div style={{ fontFamily: 'var(--pl-font-mono)', fontSize: 8.5, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#2E6B8A', marginBottom: 10 }}>Save the date</div>
                  <Monogram left="A" right="J" frame="ring" size={92} ink="#1A2A33" accent="#2E6B8A" paper="#FBF6EA" />
                  <div style={{ marginTop: 10 }}><Divider ornament="sprig" width="110px" ink="#2E6B8A" accent="#C6703D" color="rgba(46,107,138,0.3)" /></div>
                  <div style={{ fontSize: 10, color: '#5A6A72', marginTop: 8, fontFamily: 'var(--pl-font-mono)', letterSpacing: '0.06em' }}>JUNE 22 · PORTLAND</div>
                </div>
              </div>
            </div>
          </div>

          {/* dashed note */}
          <div style={{ position: 'absolute', bottom: 30, left: 16, zIndex: 6 }}>
            <div className="float" style={{ '--r': '-6deg', '--d': '8s', background: 'var(--cream-2)', padding: '18px 26px', border: '1px dashed rgba(61,74,31,0.3)', borderRadius: 3, fontFamily: 'var(--pl-font-display)', fontStyle: 'italic', fontSize: 23, color: 'var(--ink)', maxWidth: 220, boxShadow: '0 14px 30px rgba(61,74,31,0.15)' }}>
              Little moments, big meaning. <Pearl size={11} />
            </div>
          </div>

          {/* stamps */}
          <div style={{ position: 'absolute', top: 0, left: 130, zIndex: 7 }}><Stamp size={86} tone="sage" text="MADE FOR MEANINGFUL MOMENTS" rotation={-12} icon="pear" /></div>
          <div style={{ position: 'absolute', top: 290, right: 28, zIndex: 7 }}><Stamp size={78} tone="peach" text="MADE TO BE REMEMBERED" rotation={10} icon="pear" /></div>
          <div style={{ position: 'absolute', bottom: 36, right: 110, zIndex: 7 }}><Stamp size={72} tone="cream" text="WITH YOU EVERY STEP" rotation={-8} icon="heart" /></div>

          {/* botanical sprig */}
          <svg aria-hidden="true" style={{ position: 'absolute', top: 0, right: 130, zIndex: 6 }} width="80" height="120" viewBox="0 0 80 120">
            <path d="M40 100 Q 35 60, 45 20" stroke="var(--sage)" strokeWidth="1.5" fill="none" />
            {[[40,25],[46,22],[34,22],[42,18],[38,28]].map((c,i)=><circle key={i} cx={c[0]} cy={c[1]} r="3" fill="var(--peach-3)" />)}
            <circle cx="42" cy="23" r="2" fill="var(--pl-gold)" />
          </svg>
        </div>
      </div>

      <div className="meta-row">
        <span><TinyIcon name="lock" /> Your data is private and secure</span>
        <span><TinyIcon name="leaf" /> Built with care, by real humans</span>
        <span><TinyIcon name="heart" /> Here for life&apos;s big (and small) moments</span>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<SignIn />);
</script>
</body>
</html>
