<!-- @dsCard group="Brand" viewport="1040x1400" name="Occasion marks" subtitle="A bespoke glyph for all 31 Pearloom occasions, in the single-stroke hand" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Occasion marks — Pearloom</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body {
    margin: 0;
    background: radial-gradient(ellipse at 50% -6%, var(--pl-cream-deep) 0%, var(--pl-cream) 46%);
    min-height: 100vh;
    font-family: var(--pl-font-body);
    color: var(--pl-ink);
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 56px 40px 90px; }

  .eyebrow {
    font-family: var(--pl-font-mono);
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--pl-muted); display: flex; align-items: center; gap: 12px; margin: 0 0 18px;
  }
  .eyebrow::before { content: ""; width: 26px; height: 1px; background: var(--pl-gold); }

  h1 {
    font-family: var(--pl-font-display);
    font-variation-settings: var(--pl-fvs-display);
    font-weight: 400; font-size: clamp(2.2rem, 5vw, 3.2rem);
    line-height: 1.02; letter-spacing: -0.02em; margin: 0 0 10px; color: var(--pl-ink);
  }
  h1 em { font-style: italic; color: var(--pl-olive); }
  .lede { font-size: 15px; color: var(--pl-muted); margin: 0 0 8px; max-width: 52ch; line-height: 1.5; }

  .group { margin-top: 48px; }
  .group-head {
    display: flex; align-items: baseline; gap: 14px; margin: 0 0 22px;
  }
  .group-head .gname {
    font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--pl-olive);
  }
  .group-head .gcount {
    font-family: var(--pl-font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--pl-stone);
  }
  .group-head .grule { flex: 1; height: 1px; background: var(--pl-divider); }

  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  .card {
    background: var(--pl-cream-card);
    border: 1px solid var(--pl-divider);
    border-radius: 14px;
    padding: 20px 18px 18px;
    text-align: center;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 12px 28px -22px rgba(40,28,12,0.30);
    transition: transform var(--pl-dur-quick, 180ms) var(--pl-ease-spring, cubic-bezier(.34,1.56,.64,1));
  }
  .card:hover { transform: translateY(-3px); }

  .tile {
    width: 76px; height: 76px; border-radius: 19px; margin: 0 auto 14px;
    display: grid; place-items: center; box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;
  }
  .tile svg { width: 58px; height: 58px; display: block; }

  .label {
    font-family: var(--pl-font-display); font-variation-settings: var(--pl-fvs-heading);
    font-weight: 500; font-size: 17px; line-height: 1.12; margin: 0 0 6px; color: var(--pl-ink); text-wrap: balance;
  }
  .voice {
    font-family: var(--pl-font-display); font-style: italic;
    font-variation-settings: "opsz" 36, "SOFT" 60, "WONK" 0;
    font-size: 13px; line-height: 1.4; color: var(--pl-muted); margin: 0; text-wrap: pretty;
  }

  @media (max-width: 880px) { .row { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 620px) { .row { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">The wizard · occasion marks</div>
  <h1>Thirty-one occasions, <em>thirty-one marks</em>.</h1>
  <p class="lede">Every path the wizard can open with, each given its own drawn glyph in the Pearloom single-stroke hand — and signed with a gold pearl.</p>
  <div id="groups"></div>
</div>

<script>
(function () {
  var T = {
    rose:  { bg: '#F0DCD6', ink: '#C0543B', acc: '#B8923F' },
    gold:  { bg: '#EFE4CB', ink: '#9A7838', acc: '#586A3C' },
    peach: { bg: '#F1DECE', ink: '#BB6A39', acc: '#B8923F' },
    sage:  { bg: '#E7E5D3', ink: '#586A3C', acc: '#B8923F' },
    cream: { bg: '#F3EAD6', ink: '#6F6557', acc: '#B8923F' },
    night: { bg: '#292B21', ink: '#EFE9DA', acc: '#D4B373' }

  // ── 31 bespoke occasion glyphs · viewBox 64 · one consistent hand,
  //    each signed with a single gold pearl. (ink, acc) → inner SVG.
  var G = {
    weddings: function (k, a) { return ''
      + '<circle cx="26" cy="35" r="13"/><circle cx="40" cy="35" r="13"/>'
      + '<circle cx="33" cy="24" r="2.6" fill="'+a+'" stroke="none"/>'; },
    engagement: function (k, a) { return ''
      + '<circle cx="32" cy="41" r="12"/>'
      + '<path d="M24 24 L40 24 L36 30 L28 30 Z"/><path d="M28 30 L32 35 L36 30"/>'
      + '<path d="M24 24 L32 30 M40 24 L32 30 M29 24 L30.5 27 M35 24 L33.5 27"/>'
      + '<circle cx="32" cy="20" r="1.7" fill="'+a+'" stroke="none"/>'; },
    vowRenewals: function (k, a) { return ''
      + '<path d="M32 32 C 25 23 13 24 13 32 C 13 40 25 41 32 32 C 39 23 51 24 51 32 C 51 40 39 41 32 32 Z"/>'
      + '<circle cx="32" cy="32" r="2.4" fill="'+a+'" stroke="none"/>'; },
    anniversaries: function (k, a) { return ''
      + '<path d="M13 13 L29 18 C 28.5 25 22 28 18 24 C 15 21 13 17 13 13 Z"/>'
      + '<path d="M22 26 L28 42"/><path d="M22 44 L34 41"/>'
      + '<path d="M51 13 L35 18 C 35.5 25 42 28 46 24 C 49 21 51 17 51 13 Z"/>'
      + '<path d="M42 26 L36 42"/><path d="M42 44 L30 41"/>'
      + '<path d="M32 8 C 32.5 13 33.5 14 38 14.5 C 33.5 15 32.5 16 32 21 C 31.5 16 30.5 15 26 14.5 C 30.5 14 31.5 13 32 8 Z" fill="'+a+'" stroke="none"/>'; },
    proposals: function (k, a) { return ''
      + '<path d="M18 40 L46 40 L44 51 L20 51 Z"/>'
      + '<path d="M18 40 L23 35 L51 35 L46 40 Z"/>'
      + '<path d="M28 40 L36 40"/>'
      + '<path d="M32 40 C 26.5 40 25.5 28.5 32 28.5 C 38.5 28.5 37.5 40 32 40 Z"/>'
      + '<path d="M32 23 L28.8 27.5 L32 30 L35.2 27.5 Z" fill="'+a+'" stroke="'+a+'"/>'; },
    bridalShowers: function (k, a) { return ''
      + '<circle cx="23" cy="21" r="5"/><circle cx="34" cy="17" r="5"/><circle cx="41" cy="24" r="5"/>'
      + '<circle cx="34" cy="17" r="1.5" fill="'+a+'" stroke="none"/>'
      + '<path d="M23 26 C 25 35 30 41 32 51"/><path d="M34 22 C 34 32 33 42 32 51"/><path d="M41 29 C 39 38 34 44 32 51"/>'
      + '<path d="M26 43 L38 43"/><path d="M30 44 L27 51 M34 44 L37 51"/>'; },

    babyShowers: function (k, a) { return ''

      + '<path d="M32 38 C 25 36 21 31 21 24 C 28 25 32 30 32 36"/>'
      + '<path d="M32 33 C 39 31 43 26 43 19 C 36 20 32 25 32 31"/>'
      + '<circle cx="32" cy="23" r="2.4" fill="'+a+'" stroke="none"/>'; },
    genderReveals: function (k, a) { return ''
      + '<ellipse cx="32" cy="24" rx="13" ry="15"/>'
      + '<path d="M32 39 L29.5 42.5 L34.5 42.5 Z"/>'
      + '<path d="M32 42.5 C 34 47 29 50 32 56"/>'
      + '<circle cx="27" cy="19" r="1.6" fill="'+a+'" stroke="none"/>'; },
    firstBirthdays: function (k, a) { return ''
      + '<path d="M19 34 L45 34 L41 52 L23 52 Z"/>'
      + '<path d="M27 34 L25 52 M32 34 L32 52 M37 34 L39 52"/>'
      + '<path d="M19 34 C 19 27 25 25 28 27 C 30 21 38 22 38 28 C 44 27 45 33 41 34"/>'
      + '<path d="M32 24 L32 17"/>'
      + '<path d="M32 17 C 29.5 14 30 9 32 6.5 C 34 9 34.5 14 32 17 Z" fill="'+a+'" stroke="'+a+'"/>'; },
    namingCeremonies: function (k, a) { return ''
      + '<path d="M16 18 L16 22 M48 18 L48 22"/>'
      + '<path d="M16 22 L48 22 L48 40 L42 36 L36 40 L30 36 L24 40 L18 36 L16 40 Z"/>'
      + '<path d="M32 26 L33.4 30 L37.6 30 L34.2 32.6 L35.5 36.6 L32 34.2 L28.5 36.6 L29.8 32.6 L26.4 30 L30.6 30 Z" fill="'+a+'" stroke="none"/>'; },
    adoptions: function (k, a) { return ''
      + '<path d="M30 27 C 26 21 16 23 16 30.5 C 16 37.5 26 41 30 47 C 34 41 44 37.5 44 30.5 C 44 23 34 21 30 27 Z"/>'
      + '<path d="M40 31 C 38 28.5 33.5 29.5 33.5 33 C 33.5 36.5 38 38.5 40 41 C 42 38.5 46.5 36.5 46.5 33 C 46.5 29.5 42 28.5 40 31 Z" stroke="'+a+'"/>'; },

    milestoneBirthdays: function (k, a) { return ''
      + '<path d="M11 51 H53"/><path d="M16 51 L16 39 L48 39 L48 51"/>'
      + '<path d="M16 43 q 5.3 4 8 0 t 8 0 t 8 0 t 8 0"/>'
      + '<path d="M24 39 L24 29 L40 29 L40 39"/><path d="M24 32 q 4 3.5 8 0 t 8 0"/>'
      + '<path d="M32 29 L32 20"/>'
      + '<path d="M32 20 C 28 16 29 9 32 5.5 C 35 9 36 16 32 20 Z" fill="'+a+'" stroke="'+a+'"/>'; },
    birthdayParties: function (k, a) { return ''
      + '<path d="M32 13 L46 47 L18 47 Z"/>'
      + '<path d="M18 47 q 14 5 28 0"/>'
      + '<path d="M25 30 L34 26 M27 38 L38 33"/>'
      + '<circle cx="32" cy="11" r="3" fill="'+a+'" stroke="'+a+'"/>'; },
    sweetSixteens: function (k, a) { return ''
      + '<path d="M14 42 C 24 38 40 38 50 42"/>'
      + '<path d="M14 42 L20 27 L26 37 L32 23 L38 37 L44 27 L50 42"/>'
      + '<circle cx="32" cy="23" r="1.9" fill="'+a+'" stroke="none"/>'
      + '<circle cx="20" cy="27" r="1.3" fill="'+a+'" stroke="none"/><circle cx="44" cy="27" r="1.3" fill="'+a+'" stroke="none"/>'; },
    quinceaneras: function (k, a) { return ''
      + '<path d="M16 45 L48 45"/>'
      + '<path d="M16 45 L16 25 L24 33 L32 21 L40 33 L48 25 L48 45 Z"/>'
      + '<path d="M22 45 L22 41 M32 45 L32 41 M42 45 L42 41"/>'
      + '<circle cx="32" cy="21" r="1.9" fill="'+a+'" stroke="none"/>'
      + '<circle cx="16" cy="25" r="1.5" fill="'+a+'" stroke="none"/><circle cx="48" cy="25" r="1.5" fill="'+a+'" stroke="none"/>'; },
    mitzvahs: function (k, a) { return ''
      + '<path d="M32 12 L44 40 L20 40 Z"/><path d="M32 52 L44 24 L20 24 Z"/>'
      + '<circle cx="32" cy="32" r="1.9" fill="'+a+'" stroke="none"/>'; },
    baptisms: function (k, a) { return ''
      + '<path d="M14 27 C 14 41 22 50 32 50 C 42 50 50 41 50 27"/>'
      + '<path d="M32 50 L32 27 M32 50 L23 28 M32 50 L41 28 M32 50 L17 31 M32 50 L47 31"/>'
      + '<path d="M27 27 q 5 -4 10 0"/>'
      + '<path d="M32 13 C 29 17 30 22 32 22 C 34 22 35 17 32 13 Z" fill="'+a+'" stroke="'+a+'"/>'; },
    graduations: function (k, a) { return ''
      + '<path d="M32 18 L52 26 L32 34 L12 26 Z"/>'
      + '<path d="M22 30 L22 40 C 22 44 42 44 42 40 L42 30"/>'
      + '<path d="M32 26 L49 26 L49 41"/>'
      + '<circle cx="49" cy="43" r="2.2" fill="'+a+'" stroke="'+a+'"/>'; },

    retirements: function (k, a) { return ''
      + '<circle cx="32" cy="35" r="14"/>'
      + '<circle cx="32" cy="11" r="3.2"/><path d="M32 21 L32 14"/>'
      + '<path d="M32 25 v3 M32 45 v-3 M22 35 h3 M42 35 h-3"/>'
      + '<path d="M32 35 L32 27" stroke="'+a+'"/><path d="M32 35 L39 35" stroke="'+a+'"/>'
      + '<circle cx="32" cy="35" r="1.5" fill="'+a+'" stroke="none"/>'; },
    housewarmings: function (k, a) { return ''
      + '<path d="M14 33 L32 17 L50 33"/><path d="M19 30 L19 49 L45 49 L45 30"/>'
      + '<path d="M28 49 L28 39 L36 39 L36 49"/>'
      + '<path d="M32 28 C 30 25.5 26.5 26.5 26.5 29.5 C 26.5 32.5 30 34.5 32 37 C 34 34.5 37.5 32.5 37.5 29.5 C 37.5 26.5 34 25.5 32 28 Z" stroke="'+a+'"/>'; },
    homecomings: function (k, a) { return ''
      + '<path d="M32 52 C 18 49 13 32 21 16"/><path d="M32 52 C 46 49 51 32 43 16"/>'
      + '<path d="M20 23 q 6 -2 8 -7"/><path d="M16 31 q 7 -1 9 -6"/><path d="M16 40 q 7 0 9 -5"/>'
      + '<path d="M44 23 q -6 -2 -8 -7"/><path d="M48 31 q -7 -1 -9 -6"/><path d="M48 40 q -7 0 -9 -5"/>'
      + '<path d="M32 52 L28 58 M32 52 L36 58"/>'
      + '<circle cx="32" cy="13" r="2" fill="'+a+'" stroke="none"/>'; },
    farewells: function (k, a) { return ''
      + '<path d="M13 34 L51 34 L43 47 L21 47 Z"/>'
      + '<path d="M32 34 L32 16 L47 34"/><path d="M13 34 L32 20"/>'
      + '<path d="M11 51 q 6 -3 10 0 t 10 0 t 10 0 t 10 0"/>'
      + '<path d="M32 16 L38 18.5 L32 21 Z" fill="'+a+'" stroke="'+a+'"/>'; },

    memorials: function (k, a) {
      var p = '';
      [0,72,144,216,288].forEach(function (r) {
        p += '<ellipse cx="32" cy="16" rx="5" ry="9" transform="rotate('+r+' 32 28)"/>';
      });
      return p
      + '<circle cx="32" cy="28" r="3.5" fill="'+a+'" stroke="none"/>'
      + '<path d="M32 35 C 32 42 31 48 30 53"/>'
      + '<path d="M31 43 q -8 -1 -11 -7 q 7 -1 12 4"/>'
      + '<path d="M30 49 q 8 -1 11 -7 q -7 -1 -12 4"/>'; },
    celebrationsOfLife: function (k, a) { return ''
      + '<path d="M24 51 L40 51 L38 45 L26 45 Z"/><path d="M28 45 L28 27 L36 27 L36 45"/>'
      + '<path d="M32 27 L32 22"/>'
      + '<path d="M32 22 C 28 18 29 11 32 8 C 35 11 36 18 32 22 Z" fill="'+a+'" stroke="'+a+'"/>'
      + '<path d="M21 15 C 23 18 23 22 21 25"/><path d="M43 15 C 41 18 41 22 43 25"/>'; },

    reunions: function (k, a) { return ''
      + '<path d="M10 43 H54"/><path d="M21 43 A 11 11 0 0 1 43 43"/>'
      + '<path d="M32 29 L32 23"/><path d="M38.5 30.7 L41 26.4"/><path d="M25.5 30.7 L23 26.4"/>'
      + '<path d="M43.3 35.5 L47.6 33"/><path d="M20.7 35.5 L16.4 33"/>'
      + '<path d="M26 47 H38 M29 51 H35"/>'
      + '<circle cx="32" cy="43" r="2.2" fill="'+a+'" stroke="none"/>'; },
    holidayGatherings: function (k, a) { return ''
      + '<path d="M32 50 L32 41"/><path d="M26 50 L38 50"/>'
      + '<path d="M32 11 L22 26 L42 26 Z"/><path d="M32 20 L19 35 L45 35 Z"/><path d="M32 29 L17 44 L47 44 Z"/>'
      + '<circle cx="32" cy="10" r="1.9" fill="'+a+'" stroke="none"/>'; },
    newYear: function (k, a) { return ''
      + '<circle cx="32" cy="32" r="2" fill="'+a+'" stroke="none"/>'
      + '<path d="M32 22 L32 13"/><path d="M32 42 L32 51"/><path d="M22 32 L13 32"/><path d="M42 32 L51 32"/>'
      + '<path d="M25 25 L19 19"/><path d="M39 25 L45 19"/><path d="M25 39 L19 45"/><path d="M39 39 L45 45"/>'
      + '<circle cx="32" cy="12" r="1.3" fill="'+a+'" stroke="none"/><circle cx="32" cy="52" r="1.3" fill="'+a+'" stroke="none"/>'
      + '<circle cx="12" cy="32" r="1.3" fill="'+a+'" stroke="none"/><circle cx="52" cy="32" r="1.3" fill="'+a+'" stroke="none"/>'
      + '<circle cx="18" cy="18" r="1.1" fill="'+a+'" stroke="none"/><circle cx="46" cy="18" r="1.1" fill="'+a+'" stroke="none"/>'
      + '<circle cx="18" cy="46" r="1.1" fill="'+a+'" stroke="none"/><circle cx="46" cy="46" r="1.1" fill="'+a+'" stroke="none"/>'; },
    dinnerParties: function (k, a) { return ''
      + '<circle cx="32" cy="34" r="11"/><circle cx="32" cy="34" r="6"/>'
      + '<path d="M14 16 L14 25 M18 16 L18 25 M16 16 L16 25"/><path d="M16 25 L16 50"/>'
      + '<path d="M50 16 C 46 16 46 26 48 28 L48 50 M50 16 L50 28"/>'
      + '<circle cx="32" cy="34" r="1.3" fill="'+a+'" stroke="none"/>'; },
    galas: function (k, a) { return ''
      + '<path d="M27 51 L37 51 L37 31 C 37 27 35 25 34 23 L34 15 L30 15 L30 23 C 29 25 27 27 27 31 Z"/>'
      + '<path d="M27 39 L37 39"/>'
      + '<path d="M28 12 L25 9 M32 11 L32 7 M36 12 L39 9"/>'
      + '<circle cx="30" cy="9" r="2" fill="'+a+'" stroke="'+a+'"/>'
      + '<circle cx="26" cy="6" r="1.2" fill="'+a+'" stroke="none"/><circle cx="36" cy="5" r="1.2" fill="'+a+'" stroke="none"/>'; },
    gardenParties: function (k, a) { return ''
      + '<path d="M18 31 L40 31 L38 50 L20 50 Z"/>'
      + '<path d="M22 31 C 22 23 36 23 36 31"/>'
      + '<path d="M40 35 L51 27"/><path d="M49 23 L54 27 L49 31"/>'
      + '<circle cx="51" cy="34" r="1" fill="'+a+'" stroke="none"/><circle cx="48" cy="37" r="1" fill="'+a+'" stroke="none"/><circle cx="54" cy="37" r="1" fill="'+a+'" stroke="none"/>'; },
    blockParties: function (k, a) { return ''
      + '<path d="M8 18 q 24 9 48 0"/>'
      + '<path d="M14 20 L21 21.5 L17 29 Z"/>'
      + '<path d="M23 22 L30 23 L26 30.5 Z" fill="'+a+'" stroke="'+a+'"/>'
      + '<path d="M33 23 L40 22.5 L37 30 Z"/>'
      + '<path d="M43 21.5 L50 20 L46 27.5 Z"/>'; }
  };

  var GROUPS = [
    { name: 'Unions & love', items: [
      ['weddings','Weddings','rose','Two families, one long table.'],
      ['engagement','Engagement parties','peach','She said yes — now tell everyone.'],
      ['vowRenewals','Vow renewals','sage','The same yes, said again.'],
      ['anniversaries','Anniversaries','gold','The years, gathered and toasted.'],
      ['proposals','Proposals','rose','The question, and the room that holds it.'],
      ['bridalShowers','Bridal showers','cream','Tea, gifts, and good advice.']
    ]},
    { name: 'New arrivals', items: [
      ['babyShowers','Baby showers','cream','Soft mornings and small things.'],
      ['genderReveals','Gender reveals','peach','One balloon, one happy gasp.'],
      ['firstBirthdays','First birthdays','rose','One candle, cake on the floor.'],
      ['namingCeremonies','Naming ceremonies','sage','A name, spoken for the first time.'],
      ['adoptions','Adoption welcomes','gold','A door opens; a family grows.']
    ]},
    { name: 'Coming of age', items: [
      ['milestoneBirthdays','Milestone birthdays','peach','Citrus, ros\u00e9, no long speeches.'],
      ['birthdayParties','Birthday parties','rose','Hats on, the music up.'],
      ['sweetSixteens','Sweet sixteens','gold','Sixteen, the whole night ahead.'],
      ['quinceaneras','Quincea\u00f1eras','rose','A waltz, a crown, a community.'],
      ['mitzvahs','Bar & bat mitzvahs','night','A reading, then a celebration.'],
      ['baptisms','Baptisms','cream','Water, light, and welcome.'],
      ['graduations','Graduations','sage','Caps up, the next page open.']
    ]},
    { name: 'Thresholds', items: [
      ['retirements','Retirements','gold','Decades, thanked all at once.'],
      ['housewarmings','Housewarmings','sage','New keys, first dinner, open door.'],
      ['homecomings','Homecomings','cream','Back at last, the porch lit.'],
      ['farewells','Farewells','peach','A fond send-off before the road.']
    ]},
    { name: 'Remembrance', items: [
      ['memorials','Memorials','sage','Tea, their records, their people.'],
      ['celebrationsOfLife','Celebrations of life','night','A life, remembered in full light.']
    ]},
    { name: 'Gatherings', items: [
      ['reunions','Reunions','night','Everyone, back in one place.'],
      ['holidayGatherings','Holiday gatherings','sage','Lights, the long table, the season.'],
      ['newYear','New year parties','gold','Midnight, and a clean page.'],
      ['dinnerParties','Dinner parties','cream','Good food, a small table.'],
      ['galas','Galas','peach','Black tie, a good cause.'],
      ['gardenParties','Garden parties','rose','Sun, lemonade, the long lawn.'],
      ['blockParties','Block parties','cream','The whole street, one afternoon.']
    ]}
  ];

  function svgFor(name, t) {
    return '<svg viewBox="0 0 64 64" aria-hidden="true">'
      + '<g fill="none" stroke="'+t.ink+'" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">'
      + G[name](t.ink, t.acc) + '</g></svg>';
  }

  var host = document.getElementById('groups');
  GROUPS.forEach(function (grp) {
    var sec = document.createElement('section');
    sec.className = 'group';
    var head = '<div class="group-head"><span class="gname">' + grp.name + '</span>'
      + '<span class="gcount">' + grp.items.length + '</span><span class="grule"></span></div>';
    var cards = grp.items.map(function (it) {
      var id = it[0], label = it[1], t = T[it[2]], voice = it[3];
      return '<div class="card">'
        + '<div class="tile" style="background:' + t.bg + '">' + svgFor(id, t) + '</div>'
        + '<p class="label">' + label + '</p>'
        + '<p class="voice">' + voice + '</p></div>';
    }).join('');
    sec.innerHTML = head + '<div class="row">' + cards + '</div>';
    host.appendChild(sec);
  });
})();
</script>
</body>
</html>
