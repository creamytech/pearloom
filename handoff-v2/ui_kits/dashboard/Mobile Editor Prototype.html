    <div style={{ marginBottom: 16 }}>
      <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.14em', color: 'var(--pl-muted)', marginBottom: 8 }}>{label}</div>
      <div className="nosb" style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{LOOK[k].map((c) => <button key={c} onClick={() => setLook({ ...L, [k]: c })} style={{ padding: '7px 12px', borderRadius: 999, cursor: 'pointer', textTransform: 'capitalize', fontFamily: ui, fontSize: 12, fontWeight: L[k] === c ? 600 : 500, border: `1px solid ${L[k] === c ? 'var(--peach-ink, #C6703D)' : 'var(--pl-divider)'}`, background: L[k] === c ? 'var(--peach-bg, #FBE8D6)' : 'var(--pl-cream-card)', color: 'var(--pl-ink)' }}>{c}</button>)}</div>
    </div>
  );

  return (
    <div className="phone"><div className="screen">
      <div className="notch" />
      <Status />
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '2px 14px 9px', background: 'var(--pl-chrome-surface, #FBF7EE)', borderBottom: '1px solid var(--pl-chrome-border, #D8CFB8)', flexShrink: 0 }}>
        <button style={{ width: 30, height: 30, borderRadius: 999, border: '1px solid var(--pl-chrome-border, #D8CFB8)', background: 'var(--pl-cream)', color: 'var(--pl-ink)', display: 'grid', placeItems: 'center', cursor: 'pointer', flexShrink: 0 }}><I d={IC.back} s={15} /></button>
        <div style={{ display: 'flex', gap: 2, background: 'var(--pl-cream-deep, #F0E9D8)', borderRadius: 999, padding: 3, margin: '0 auto' }}>
          {[['edit', 'Edit'], ['preview', 'Preview']].map(([k, l]) => <button key={k} onClick={() => { setMode(k); setSheet(null); if (k === 'preview') setSel(null); }} style={{ padding: '6px 15px', borderRadius: 999, border: 'none', cursor: 'pointer', fontFamily: ui, fontSize: 12.5, fontWeight: mode === k ? 600 : 500, background: mode === k ? 'var(--pl-ink)' : 'transparent', color: mode === k ? 'var(--pl-cream)' : 'var(--pl-ink-soft)' }}>{l}</button>)}
        </div>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontFamily: mono, fontSize: 9.5, color: 'var(--pl-muted)', flexShrink: 0 }}><span style={{ width: 6, height: 6, borderRadius: 99, background: 'var(--sage)' }} />Saved</span>
        <button style={{ flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 5, padding: '7px 13px', borderRadius: 999, border: '1px solid var(--pl-gold-soft)', fontSize: 12.5, fontWeight: 600, cursor: 'pointer', fontFamily: ui, color: 'var(--pl-ink)', background: 'linear-gradient(135deg,#F4ECD8 0%,#E8C77A 40%,#D9A89E 70%,#F4ECD8 100%)' }}>Publish ↑</button>
      </div>
      {/* canvas — the REAL renderer, themed via --t-* + look */}
      <div onClick={() => edit && setSel(null)} className="nosb" style={{ flex: 1, overflowY: 'auto', background: 'var(--pl-chrome-bg, #F5EFE2)', backgroundImage: edit ? 'radial-gradient(circle, rgba(20,14,8,0.07) 1px, transparent 1px)' : 'none', backgroundSize: '15px 15px', padding: edit ? '14px 14px' : '0' }}>
        <div style={{ ...themeStyle, position: 'relative', borderRadius: edit ? 12 : 0, overflow: 'hidden', boxShadow: edit ? '0 16px 40px -18px rgba(40,28,12,0.3)' : 'none' }}>{paper !== 'none' ? <div className={'pl-tx-' + (paper === 'grain' ? 'laid' : 'linen')} style={{ position: 'absolute', inset: 0, opacity: 0.5, pointerEvents: 'none', zIndex: 0 }} /> : null}
          {visible.map((s, idx) => {
            const on = edit && sel === s.id;
            const gap = L.motifDensity === 'generous' ? true : L.motifDensity === 'sparse' ? idx % 2 === 1 : false;
            return (
              <React.Fragment key={s.id}>
                {idx > 0 && s.type !== 'opening' && gap ? <Divider look={L} /> : null}
                <div onClick={(e) => { if (edit) { e.stopPropagation(); setSel(s.id); } }} style={{ position: 'relative', padding: s.type === 'opening' && (s.lay === 'Full-bleed') ? 0 : '16px 18px', margin: edit ? '4px 6px' : 0, borderRadius: 8, cursor: edit ? 'pointer' : 'default', outline: on ? '2px solid var(--peach-ink, #C6703D)' : 'none', outlineOffset: 1, opacity: s.hidden ? 0.4 : 1 }}>
                  {on ? (
                    <div onClick={(e) => e.stopPropagation()} style={{ position: 'absolute', top: -16, right: 8, display: 'flex', gap: 1, background: 'var(--pl-ink)', borderRadius: 10, padding: 3, zIndex: 22, boxShadow: '0 10px 24px rgba(40,28,12,0.25)' }}>
                      {[['edit', IC.pencil, () => setSheet('block')], ['up', IC.up, () => move(s.id, -1)], ['down', IC.down, () => move(s.id, 1)], ['dup', IC.copy, () => dup(s.id)], ['del', IC.trash, () => del(s.id)]].map(([k, d, fn]) => <button key={k} onClick={fn} style={{ width: 32, height: 30, display: 'grid', placeItems: 'center', borderRadius: 7, border: 'none', background: 'transparent', cursor: 'pointer', color: k === 'edit' ? 'var(--pl-gold)' : 'var(--pl-cream)' }}><I d={d} s={15} /></button>)}
                    </div>
                  ) : null}
                  {/* inline section-layout switcher */}
                  {on && LAYOUTS[s.type] ? (
                    <div onClick={(e) => e.stopPropagation()} style={{ display: 'flex', gap: 5, marginBottom: 10, flexWrap: 'wrap' }}>
                      {LAYOUTS[s.type].map((v) => { const cur = (s.lay || (s.type === 'opening' ? (L.heroAlign === 'left' ? 'Left' : 'Centered') : LAYOUTS[s.type][0])) === v; return <button key={v} onClick={() => setLay(s.id, v)} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 9px', borderRadius: 7, cursor: 'pointer', fontFamily: ui, fontSize: 10.5, fontWeight: cur ? 600 : 500, border: `1px solid ${cur ? 'var(--peach-ink, #C6703D)' : 'var(--pl-divider)'}`, background: cur ? 'var(--peach-bg, #FBE8D6)' : 'var(--pl-cream-card)', color: 'var(--pl-ink)' }}><I d={IC.layout} s={11} />{v}</button>; })}
                    </div>
                  ) : null}
                  {s.hidden ? <div style={{ position: 'absolute', top: 8, right: 12, fontFamily: mono, fontSize: 8.5, letterSpacing: '0.1em', color: 'var(--t-ink-muted)' }}>HIDDEN</div> : null}
                  <Body s={s} look={L} />
                </div>
              </React.Fragment>
            );
          })}
        </div>
        {edit ? <div style={{ textAlign: 'center', padding: '14px 0 8px', fontFamily: ui, fontSize: 12.5, color: 'var(--pl-muted)' }}>Tap a section · its layout switches inline · Decor restyles all of it</div> : null}
      </div>
      {edit ? <Dock /> : <button onClick={() => setMode('edit')} style={{ position: 'absolute', right: 20, bottom: 34, zIndex: 40, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 18px', borderRadius: 999, border: 'none', background: 'var(--pl-ink)', color: 'var(--pl-cream)', fontFamily: ui, fontSize: 14, fontWeight: 600, cursor: 'pointer', boxShadow: '0 24px 56px rgba(40,28,12,0.3)' }}><I d={IC.pencil} s={16} /> Edit</button>}

      {/* SECTIONS */}
      {sheet === 'pages' ? (
        <Sheet title="Sections" h={580}>
          <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.1em', color: 'var(--pl-muted)', marginBottom: 8, display: 'flex', justifyContent: 'space-between' }}><span>PAGE SECTIONS</span><span style={{ textTransform: 'none', letterSpacing: 0, fontFamily: ui }}>drag to reorder</span></div>
          {secs.map((s, i) => { const m = meta(s.type); return (
            <div key={s.id} onClick={() => { setSel(s.id); setSheet('block'); }} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 10, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-card)', marginBottom: 7, opacity: s.hidden ? 0.55 : 1, cursor: 'pointer' }}>
              <span style={{ color: 'var(--pl-muted)' }}><I d={IC.drag} s={15} /></span>
              <span style={{ fontFamily: 'var(--pl-font-display)', fontSize: 14, color: 'var(--pl-olive)', width: 18, textAlign: 'center' }}>{m.glyph}</span>
              <span style={{ flex: 1, minWidth: 0 }}><span style={{ display: 'flex', alignItems: 'center', gap: 6, fontFamily: ui, fontSize: 13.5, fontWeight: 600, color: 'var(--pl-ink)' }}>{s.title}{m.attn ? <span style={{ width: 5, height: 5, borderRadius: 99, background: 'var(--peach-ink, #C6703D)' }} /> : null}</span><span style={{ display: 'block', fontSize: 11, color: 'var(--pl-muted)', fontFamily: ui }}>{m.desc}</span></span>
              <button onClick={(e) => { e.stopPropagation(); move(s.id, -1); }} disabled={i === 0} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: i === 0 ? 'var(--pl-divider)' : 'var(--pl-ink-soft)' }}><I d={IC.up} s={15} /></button>
              <button onClick={(e) => { e.stopPropagation(); hide(s.id); }} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: s.hidden ? 'var(--pl-terra)' : 'var(--pl-olive)' }}><I d={s.hidden ? IC.eyeoff : IC.eye} s={15} /></button>
            </div>
          ); })}
          <button onClick={() => setSheet('add')} style={{ width: '100%', padding: '11px', borderRadius: 10, border: '1.5px dashed var(--pl-divider)', background: 'transparent', color: 'var(--peach-ink, #C6703D)', fontFamily: ui, fontSize: 13.5, fontWeight: 600, marginTop: 2, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6, cursor: 'pointer' }}><I d={IC.add} s={15} /> Add section</button>
          <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.1em', color: 'var(--pl-muted)', margin: '18px 0 8px' }}>TOOLS</div>
          {TOOLS.map(([id, l, g, d]) => <div key={id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 10, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-card)', marginBottom: 7 }}><span style={{ fontFamily: 'var(--pl-font-display)', fontSize: 14, color: 'var(--pl-olive)', width: 18, textAlign: 'center' }}>{g}</span><span style={{ flex: 1 }}><span style={{ display: 'block', fontFamily: ui, fontSize: 13.5, fontWeight: 600, color: 'var(--pl-ink)' }}>{l}</span><span style={{ fontSize: 11, color: 'var(--pl-muted)', fontFamily: ui }}>{d}</span></span></div>)}
        </Sheet>
      ) : null}

      {/* ADD */}
      {sheet === 'add' ? (
        <Sheet title="Add a section" h={520}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>{SECTIONS.map((m) => <button key={m.id} onClick={() => addBlock(m.id)} style={{ display: 'flex', flexDirection: 'column', gap: 6, padding: '14px', borderRadius: 12, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-card)', cursor: 'pointer', textAlign: 'left' }}><span style={{ fontFamily: 'var(--pl-font-display)', fontSize: 18, color: 'var(--pl-olive)' }}>{m.glyph}</span><span style={{ fontFamily: ui, fontSize: 13.5, fontWeight: 600, color: 'var(--pl-ink)' }}>{m.label}</span><span style={{ fontSize: 11, color: 'var(--pl-muted)', fontFamily: ui }}>{m.desc}</span></button>)}</div>
        </Sheet>
      ) : null}

      {/* THEME — mirrors the desktop ThemeRail: Palette · Type · Paper texture · Theme Shop, + decor look & spacing */}
      {sheet === 'style' ? (
        <Sheet title="Dress the page." h={604}>
          <div style={GRP}>
            <div style={LBL}>PALETTE</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {THEMES.filter((t) => ['garden', 'santorini', 'tuscan', 'midnight'].indexOf(t.id) >= 0).map((t) => { const on = themeId === t.id; return (
                <button key={t.id} onClick={() => pickTheme(t.id)} style={{ padding: 0, borderRadius: 10, overflow: 'hidden', border: on ? '2px solid var(--peach-ink, #C6703D)' : '1px solid var(--pl-divider)', cursor: 'pointer', background: 'var(--pl-cream)' }}>
                  <div style={{ height: 38, display: 'flex' }}>{t.swatches.map((c, i) => <div key={i} style={{ flex: 1, background: c }} />)}</div>
                  <div style={{ padding: '6px 9px', fontFamily: ui, fontSize: 12, fontWeight: 600, color: 'var(--pl-ink)', textAlign: 'left' }}>{t.name}</div>
                </button>); })}
            </div>
          </div>
          <div style={GRP}>
            <div style={LBL}>TYPE</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {TYPEFACES.map(([n, f, d]) => { const on = (font || (theme.vars && theme.vars['--t-display'])) === f; return (
                <button key={n} onClick={() => setFont(f)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderRadius: 9, border: on ? '1.5px solid var(--peach-ink, #C6703D)' : '1px solid var(--pl-divider)', background: on ? 'var(--peach-bg, #FBE8D6)' : 'var(--pl-cream)', cursor: 'pointer', textAlign: 'left' }}>
                  <span style={{ fontFamily: f, fontSize: 18, color: 'var(--pl-ink)', flex: 1 }}>{n}</span><span style={{ fontSize: 10.5, color: 'var(--pl-muted)', fontFamily: ui }}>{d}</span></button>); })}
            </div>
          </div>
          <div style={GRP}>
            <div style={LBL}>PAPER TEXTURE</div>
            <div style={{ display: 'flex', gap: 8 }}>{[['none', 'None'], ['grain', 'Grain'], ['linen', 'Linen']].map(([k, l]) => { const on = paper === k; return <button key={k} onClick={() => setPaper(k)} style={{ flex: 1, padding: '9px', borderRadius: 9, fontFamily: ui, fontSize: 12.5, fontWeight: on ? 600 : 500, border: on ? '1.5px solid var(--peach-ink, #C6703D)' : '1px solid var(--pl-divider)', background: on ? 'var(--peach-bg, #FBE8D6)' : 'var(--pl-cream)', color: 'var(--pl-ink)', cursor: 'pointer' }}>{l}</button>; })}</div>
          </div>
          <div style={GRP}>
            <div style={LBL}>DECOR · {theme.name.toUpperCase()} KIT</div>
            <Opt k="card" label="CARDS" /><Opt k="photo" label="PHOTO FRAMES" /><Opt k="divider" label="DIVIDERS" /><Opt k="button" label="BUTTONS" /><Opt k="heroAlign" label="OPENING ALIGN" /><Opt k="motifDensity" label="MOTIF DENSITY" />
          </div>
          <div style={GRP}>
            <div style={LBL}>SPACING</div>
            <div style={{ display: 'flex', gap: 6 }}>{DENSITY.map((d) => { const on = density === d; return <button key={d} onClick={() => setDensity(d)} style={{ flex: 1, padding: '9px 4px', borderRadius: 9, textTransform: 'capitalize', fontFamily: ui, fontSize: 12, fontWeight: on ? 600 : 500, border: on ? '1.5px solid var(--peach-ink, #C6703D)' : '1px solid var(--pl-divider)', background: on ? 'var(--peach-bg, #FBE8D6)' : 'var(--pl-cream)', color: 'var(--pl-ink)', cursor: 'pointer' }}>{d}</button>; })}</div>
          </div>
          <div style={GRP}>
            <div style={{ ...LBL, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}><span>THEME SHOP</span><span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '2px 8px', borderRadius: 999, border: '1px solid var(--gold-line)', background: 'rgba(193,154,75,0.14)', color: '#8A6A2E', fontSize: 10, fontWeight: 600 }}><I d={IC.lock} s={10} /> Full bolt</span></div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {THEMES.filter((t) => ['garden', 'santorini', 'tuscan', 'midnight'].indexOf(t.id) < 0).map((t) => { const on = themeId === t.id; return (
                <button key={t.id} onClick={() => pickTheme(t.id)} style={{ padding: 0, borderRadius: 10, overflow: 'hidden', border: on ? '2px solid var(--peach-ink, #C6703D)' : '1px solid var(--pl-divider)', cursor: 'pointer', background: 'var(--pl-cream)' }}>
                  <div style={{ height: 34, display: 'flex' }}>{t.swatches.map((c, i) => <div key={i} style={{ flex: 1, background: c }} />)}</div>
                  <div style={{ padding: '6px 9px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}><span style={{ fontFamily: ui, fontSize: 11.5, fontWeight: 600, color: 'var(--pl-ink)' }}>{t.name}</span><I d={IC.lock} s={11} c="#8A6A2E" /></div>
                </button>); })}
            </div>
            <div style={{ ...LBL, marginTop: 14 }}>ORNAMENT KIT</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 8 }}>{['sprig', 'laurel', 'bloom', 'rings', 'dove', 'star', 'sun', 'vine', 'feather', 'wave'].map((m) => { const free = ['sprig', 'rings', 'star', 'laurel'].indexOf(m) >= 0; return <button key={m} onClick={() => free && setLook({ ...L, divider: m === 'bloom' ? 'bloom' : 'sprig', motifDensity: L.motifDensity === 'none' ? 'sparse' : L.motifDensity })} style={{ position: 'relative', aspectRatio: '1', borderRadius: 9, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-card)', display: 'grid', placeItems: 'center', cursor: free ? 'pointer' : 'default', opacity: free ? 1 : 0.75 }}>{Motif ? <Motif name={m} size={20} color="var(--pl-olive)" accent="var(--pl-gold)" /> : '✦'}{!free ? <span style={{ position: 'absolute', top: 4, right: 4, color: '#8A6A2E' }}><I d={IC.lock} s={9} /></span> : null}</button>; })}</div>
          </div>
        </Sheet>
      ) : null}

      {/* BLOCK */}
      {sheet === 'block' && selSec ? (
        <Sheet title={'Editing · ' + meta(selSec.type).label} h={540}>
          {LAYOUTS[selSec.type] ? (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.14em', color: 'var(--pl-muted)', marginBottom: 8 }}>SECTION LAYOUT</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{LAYOUTS[selSec.type].map((v) => { const cur = (selSec.lay || (selSec.type === 'opening' ? (L.heroAlign === 'left' ? 'Left' : 'Centered') : LAYOUTS[selSec.type][0])) === v; return <button key={v} onClick={() => setLay(selSec.id, v)} style={{ padding: '8px 12px', borderRadius: 10, cursor: 'pointer', fontFamily: ui, fontSize: 12, fontWeight: cur ? 600 : 500, border: `1px solid ${cur ? 'var(--peach-ink, #C6703D)' : 'var(--pl-divider)'}`, background: cur ? 'var(--peach-bg, #FBE8D6)' : 'var(--pl-cream-card)', color: 'var(--pl-ink)' }}>{v}</button>; })}</div>
            </div>
          ) : null}
          <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.14em', color: 'var(--pl-muted)', marginBottom: 6 }}>SECTION TITLE</div>
          <input value={selSec.title} onChange={(e) => setTitle(selSec.id, e.target.value)} style={{ width: '100%', boxSizing: 'border-box', padding: '11px 14px', borderRadius: 10, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-deep, #F0E9D8)', fontFamily: 'var(--pl-font-display)', fontStyle: 'italic', fontSize: 17, color: 'var(--pl-ink)', marginBottom: 16 }} />
          {selSec.type === 'schedule' ? (
            <>{(selSec.items || []).map(([t, l], i) => <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderRadius: 10, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-card)', marginBottom: 7 }}><span style={{ fontFamily: mono, fontSize: 12, color: 'var(--pl-terra)', width: 36 }}>{t}</span><span style={{ flex: 1, fontFamily: ui, fontSize: 13.5, color: 'var(--pl-ink)' }}>{l}</span><button onClick={() => setSecs((a) => a.map((x) => x.id === selSec.id ? { ...x, items: x.items.filter((_, j) => j !== i) } : x))} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--pl-muted)' }}><I d={IC.trash} s={14} /></button></div>)}
              <button onClick={() => setSecs((a) => a.map((x) => x.id === selSec.id ? { ...x, items: [...(x.items || []), ['7:30', 'A new moment']] } : x))} style={{ width: '100%', padding: '9px', borderRadius: 9, border: '1.5px dashed var(--pl-divider)', background: 'transparent', color: 'var(--peach-ink, #C6703D)', fontFamily: ui, fontSize: 12.5, fontWeight: 600, cursor: 'pointer' }}>+ Add a moment</button></>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', borderRadius: 12, background: 'var(--lavender-bg, #E8E0F0)' }}><PearloomGlyph size={18} color="var(--lavender-ink, #6B5A8C)" /><span style={{ flex: 1, fontFamily: 'var(--pl-font-display)', fontStyle: 'italic', fontSize: 13.5, color: 'var(--pl-ink)' }}>"Want me to write this in your voice?"</span><Button variant="ink" size="sm">Draft</Button></div>
          )}
        </Sheet>
      ) : null}

      {/* PEAR */}
      {sheet === 'pear' ? (
        <Sheet title="Pear" h={360}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}><PearloomGlyph size={22} color="var(--lavender-ink, #6B5A8C)" /><span style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: '0.14em', color: 'var(--lavender-ink, #6B5A8C)' }}>YOUR DESIGN ADVISOR</span></div>
          {['Pick a theme from our cover photo', 'Make the layout feel more like a garden party', 'Tighten the copy on every section', 'Match the type to our save-the-date'].map((q) => <button key={q} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '12px 14px', borderRadius: 12, border: '1px solid var(--pl-divider)', background: 'var(--pl-cream-card)', fontFamily: ui, fontSize: 13.5, color: 'var(--pl-ink)', marginBottom: 8, cursor: 'pointer' }}>{q}</button>)}
        </Sheet>
      ) : null}

      <div className="home-ind" />
    </div></div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
