<!-- Pearloom app — design reference (see README.md). -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pearloom — the app</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--cream-3); }
  .stage { min-width: 100%; min-height: 100vh; width: max-content; box-sizing: border-box; padding: 56px; background:
    radial-gradient(ellipse 60% 50% at 100% -5%, var(--peach-bg) 0%, transparent 55%),
    radial-gradient(ellipse 46% 40% at -3% 6%, var(--sage-tint) 0%, transparent 50%), var(--cream-3); }
  .row { display: flex; gap: 48px; align-items: flex-start; }
  .framelabel { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--pl-muted); margin: 0 0 14px 8px; }
  /* phone shell */
  .phone { width: 384px; height: 812px; border-radius: 54px; background: #14110b; padding: 11px; box-shadow: 0 40px 90px -30px rgba(40,28,12,0.5), 0 0 0 1px rgba(20,14,8,0.06); flex: none; }
  .screen { width: 100%; height: 100%; border-radius: 44px; overflow: hidden; background: var(--pl-cream); position: relative; display: flex; flex-direction: column; }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 128px; height: 30px; background: #14110b; border-radius: 0 0 18px 18px; z-index: 30; }
  .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px 4px; font-family: var(--pl-font-mono); font-size: 12px; color: var(--pl-ink); flex-shrink: 0; }
  .scroll { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .home-ind { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 128px; height: 5px; border-radius: 99px; background: rgba(20,14,8,0.28); z-index: 30; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
const { Button, PearloomGlyph, PearloomWordmark, Monogram, Pearl, Card, Eyebrow, Thread } = window.PearloomDesignSystem_55118c;
const mono = 'var(--pl-font-mono)'; const disp = 'var(--pl-font-display)'; const body = 'var(--pl-font-body)';

function Status({ dark }) {
  const c = dark ? 'var(--pl-cream)' : 'var(--pl-ink)';
  return (
    <div className="statusbar" style={{ color: c }}>
      <span>9:41</span>
      <span style={{ display: 'inline-flex', gap: 6, alignItems: 'center' }}>
        <svg width="17" height="11" viewBox="0 0 17 11" fill={c}><rect x="0" y="6" width="3" height="5" rx="1"/><rect x="4.5" y="4" width="3" height="7" rx="1"/><rect x="9" y="2" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
        <svg width="22" height="11" viewBox="0 0 22 11" fill="none" stroke={c} strokeWidth="1"><rect x="0.5" y="0.5" width="18" height="10" rx="2.5"/><rect x="2" y="2" width="13" height="7" rx="1" fill={c}/><rect x="20" y="3.5" width="1.5" height="4" rx="0.7" fill={c}/></svg>
      </span>
    </div>
  );
}
function Phone({ dark, children }) {
  return (
    <div className="phone">
      <div className="screen" style={dark ? { background: 'var(--pl-cream)' } : null}>
        <div className="notch" />
        {children}
        <div className="home-ind" style={dark ? { background: 'rgba(245,239,226,0.4)' } : null} />
      </div>
    </div>
  );
}

// ── 1 · Guest invitation + RSVP ──
function Invite() {
  return (
    <Phone>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column' }}>
        <div style={{ position: 'relative', height: 384, background: 'center/cover url(../../assets/imagery/vase-linen-still.png)' }}>
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(24,24,27,0.28), transparent 30%, transparent 55%, rgba(253,250,240,0.9) 96%, var(--pl-cream))' }} />
          <Status dark />
          <div style={{ position: 'absolute', inset: 'auto 0 0 0', textAlign: 'center', padding: '0 28px 6px' }}>
            <Monogram left="M" right="J" frame="ring" size={52} ink="var(--pl-ink)" accent="var(--pl-olive)" paper="var(--pl-cream)" />
          </div>
        </div>
        <div style={{ flex: 1, padding: '4px 28px 0', textAlign: 'center', display: 'flex', flexDirection: 'column' }}>
          <div style={{ fontFamily: mono, fontSize: 10.5, letterSpacing: '0.26em', color: 'var(--pl-terra)' }}>YOU'RE INVITED</div>
          <div style={{ fontFamily: disp, fontStyle: 'italic', fontSize: 46, lineHeight: 1, color: 'var(--pl-ink)', margin: '12px 0 4px' }}>Mira <span style={{ fontStyle: 'normal' }}>&</span> Jun</div>
          <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: '0.16em', color: 'var(--pl-muted)' }}>SEPT 6, 2026 · POINT REYES</div>
          <p style={{ fontFamily: body, fontSize: 14.5, lineHeight: 1.6, color: 'var(--pl-ink-soft)', margin: '18px 0 0' }}>A bright Saturday, two families, one very long table. Come for the vows, stay for the dancing.</p>
          <div style={{ flex: 1 }} />
          <div style={{ background: 'var(--pl-cream-card)', border: '1px solid var(--pl-divider)', borderRadius: 18, padding: 16, marginBottom: 20, textAlign: 'left' }}>
            <div style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: '0.14em', color: 'var(--pl-muted)', marginBottom: 10 }}>WILL YOU JOIN US, AMARA?</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <Button variant="ink" size="md" style={{ flex: 1 }}>Joyfully yes</Button>
              <Button variant="paper" size="md">Regretfully no</Button>
            </div>
            <div style={{ fontFamily: mono, fontSize: 10, color: 'var(--pl-muted)', marginTop: 10, textAlign: 'center' }}>Kindly reply by Aug 10</div>
          </div>
        </div>
      </div>
    </Phone>
  );
}

// ── 2 · Guest — the day & your seat ──
const RUN = [['4:00', 'Gather on the lawn', false], ['5:00', 'The ceremony', true], ['6:30', 'Supper & toasts', false], ['9:00', 'Dancing in the barn', false]];
function TheDay() {
  return (
    <Phone>
      <Status />
      <div style={{ padding: '8px 24px 14px', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 10 }}>
        <PearloomGlyph size={24} color="var(--pl-olive)" />
        <PearloomWordmark size={17} color="var(--pl-ink)" />
        <span style={{ flex: 1 }} />
        <span style={{ width: 30, height: 30, borderRadius: 999, background: 'var(--pl-gradient-olive, var(--pl-olive))', display: 'grid', placeItems: 'center', color: 'var(--pl-cream)', fontFamily: disp, fontStyle: 'italic', fontSize: 13 }}>A</span>
      </div>
      <div className="scroll" style={{ overflowY: 'auto', padding: '0 22px 24px' }}>
        <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: '0.2em', color: 'var(--pl-terra)' }}>YOUR DAY, AMARA</div>
        <div style={{ fontFamily: disp, fontSize: 30, lineHeight: 1.1, color: 'var(--pl-ink)', margin: '6px 0 16px' }}>Everything, <span style={{ fontStyle: 'italic', color: 'var(--pl-olive)' }}>in its hour.</span></div>
        <div style={{ background: 'var(--pl-olive-8, var(--pl-cream-card))', border: '1px solid var(--pl-divider)', borderRadius: 16, padding: 16, marginBottom: 18 }}>
          <div style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: '0.14em', color: 'var(--pl-olive)', marginBottom: 8 }}>YOUR SEAT</div>
          <div style={{ display: 'flex', gap: 16 }}>
            {[['Table', '3'], ['Meal', 'Fish'], ['Party', '2']].map(([l, v]) => (
              <div key={l}><div style={{ fontFamily: mono, fontSize: 9, color: 'var(--pl-muted)' }}>{l.toUpperCase()}</div><div style={{ fontFamily: disp, fontSize: 24, color: 'var(--pl-ink)' }}>{v}</div></div>
            ))}
          </div>
        </div>
        <div style={{ position: 'relative', paddingLeft: 4 }}>
          <div style={{ position: 'absolute', left: 49, top: 8, bottom: 14, width: 2, background: 'var(--pl-divider)' }} />
          {RUN.map(([t, l, now], i) => (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '46px 24px 1fr', alignItems: 'center', padding: '11px 0' }}>
              <span style={{ fontFamily: mono, fontSize: 12, textAlign: 'right', paddingRight: 8, color: now ? 'var(--pl-terra)' : 'var(--pl-muted)' }}>{t}</span>
              <span style={{ display: 'grid', placeItems: 'center', zIndex: 1 }}><span style={{ width: now ? 13 : 10, height: now ? 13 : 10, borderRadius: 99, background: now ? 'var(--pl-terra)' : 'var(--pl-cream)', border: `2px solid ${now ? 'var(--pl-cream)' : 'var(--pl-stone)'}`, outline: now ? '2px solid var(--pl-terra)' : 'none' }} /></span>
              <span style={{ fontFamily: body, fontSize: 14.5, fontWeight: now ? 600 : 500, color: 'var(--pl-ink)', paddingLeft: 10 }}>{l}</span>
            </div>
          ))}
        </div>
        <Thread width="100%" style={{ margin: '14px 0' }} />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {[['Travel & stay'], ['The registry'], ['Add photos'], ['Message hosts']].map(([l]) => (
            <div key={l} style={{ padding: '14px 12px', borderRadius: 12, background: 'var(--pl-cream-card)', border: '1px solid var(--pl-divider)', fontFamily: body, fontSize: 13, color: 'var(--pl-ink)' }}>{l}</div>
          ))}
        </div>
      </div>
    </Phone>
  );
}

// ── 3 · Host pocket dashboard ──
function TabIcon({ d }) { return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: d }} />; }
const TABS = [
  ['M3 10.5 12 3l9 7.5M5 9.5V20h14V9.5', 'Home', true],
  ['<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/>', 'Guests', false],
  ['<path d="M12 3.5c.5 3.4 1.6 4.5 5 5-3.4.5-4.5 1.6-5 5-.5-3.4-1.6-4.5-5-5 3.4-.5 4.5-1.6 5-5Z"/>', 'Studio', false],
  ['<rect x="3.5" y="4.5" width="17" height="15" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M4.5 17.5 9 13l3 2.5L15.5 11l4.5 5"/>', 'Reel', false],
];
function HostHome() {
  return (
    <Phone>
      <Status />
      <div style={{ padding: '6px 22px 12px', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 9 }}>
        <PearloomGlyph size={22} color="var(--pl-olive)" />
        <div style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: '0.16em', color: 'var(--pl-muted)' }}>MIRA & JUN'S LOOM</div>
        <span style={{ flex: 1 }} />
        <span style={{ position: 'relative', width: 28, height: 28, borderRadius: 999, border: '1px solid var(--pl-divider)', display: 'grid', placeItems: 'center', color: 'var(--pl-ink)' }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 1.5 6.5 1.5 6.5h-15S6 14 6 9Z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>
          <span style={{ position: 'absolute', top: 5, right: 6, width: 6, height: 6, borderRadius: 99, background: 'var(--pl-terra)' }} />
        </span>
      </div>
      <div className="scroll" style={{ overflowY: 'auto', padding: '0 18px' }}>
        <div style={{ background: 'var(--pl-ink)', color: 'var(--pl-cream)', borderRadius: 20, padding: '22px 20px', overflow: 'hidden', position: 'relative' }}>
          <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.16em', color: 'var(--pl-gold)' }}>84 DAYS TO GO</div>
          <div style={{ fontFamily: disp, fontSize: 52, lineHeight: 1, letterSpacing: '-0.03em', margin: '6px 0 8px' }}>84 <span style={{ fontStyle: 'italic', color: 'var(--peach, #F0C9A8)' }}>days</span></div>
          <div style={{ fontFamily: body, fontSize: 13, color: 'var(--pl-stone, #C9BFA8)', lineHeight: 1.5 }}>You're on track — 4 things want a decision this week.</div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, margin: '14px 0' }}>
          {[['COMING', '38', '+5 likely', 'var(--pl-olive)'], ['BUDGET', '74%', '$35k / $48k', 'var(--pl-terra)']].map(([l, v, s, c]) => (
            <div key={l} style={{ background: 'var(--pl-cream-card)', border: '1px solid var(--pl-divider)', borderRadius: 14, padding: '14px 16px' }}>
              <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.12em', color: 'var(--pl-muted)' }}>{l}</div>
              <div style={{ fontFamily: disp, fontSize: 32, color: 'var(--pl-ink)', lineHeight: 1.1 }}>{v}</div>
              <div style={{ fontFamily: body, fontSize: 11.5, color: c }}>{s}</div>
            </div>
          ))}
        </div>
        <div style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: '0.16em', color: 'var(--pl-terra)', margin: '4px 4px 8px' }}>NEEDS YOU NOW</div>
        {[['3 guest photos waiting for the wall', 'The Reel'], ['2 quiet RSVPs — Pear can nudge', 'Guests']].map(([t, s], i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, background: 'var(--pl-cream-card)', border: '1px solid var(--pl-divider)', borderRadius: 14, padding: '12px 14px', marginBottom: 10 }}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: 'var(--pl-terra)', flexShrink: 0 }} />
            <span style={{ flex: 1 }}><span style={{ display: 'block', fontFamily: body, fontSize: 13.5, fontWeight: 500, color: 'var(--pl-ink)' }}>{t}</span><span style={{ fontFamily: body, fontSize: 11.5, color: 'var(--pl-muted)' }}>{s}</span></span>
            <span style={{ fontFamily: disp, fontSize: 18, color: 'var(--pl-olive)' }}>→</span>
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-around', padding: '10px 8px 22px', borderTop: '1px solid var(--pl-divider)', background: 'var(--pl-cream)', flexShrink: 0 }}>
        {TABS.map(([d, l, on]) => (
          <div key={l} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, color: on ? 'var(--pl-ink)' : 'var(--pl-muted)' }}>
            <TabIcon d={d} />
            <span style={{ fontFamily: body, fontSize: 10, fontWeight: on ? 600 : 400 }}>{l}</span>
          </div>
        ))}
      </div>
    </Phone>
  );
}

// ── 4 · Host site editor (four-zone shell) ──
const SECTIONS = [['◆', 'Cover'], ['❧', 'Our story'], ['◉', 'The day'], ['☞', 'Travel'], ['⛉', 'Registry'], ['✦', 'RSVP']];
function Editor() {
  return (
    <div style={{ width: 900, height: 580, borderRadius: 16, overflow: 'hidden', background: 'var(--pl-chrome-surface, #FBF7EE)', border: '1px solid var(--pl-chrome-border, #D8CFB8)', boxShadow: '0 40px 90px -34px rgba(40,28,12,0.45)', flex: 'none', display: 'flex', flexDirection: 'column', fontFamily: body }}>
      {/* browser chrome */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', background: 'var(--pl-chrome-surface-2, #F0E9D8)', borderBottom: '1px solid var(--pl-chrome-border, #D8CFB8)', flexShrink: 0 }}>
        <span style={{ display: 'flex', gap: 6 }}>{['#E0A07A', '#D9C77E', '#A8BA72'].map((c) => <span key={c} style={{ width: 11, height: 11, borderRadius: 99, background: c }} />)}</span>
        <div style={{ flex: 1, maxWidth: 360, margin: '0 auto', textAlign: 'center', background: 'var(--pl-cream)', border: '1px solid var(--pl-chrome-border, #D8CFB8)', borderRadius: 8, padding: '4px 12px', fontFamily: mono, fontSize: 11, color: 'var(--pl-muted)' }}>pearloom.com/mira-and-jun · editing</div>
      </div>
      {/* toolbar */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 16px', borderBottom: '1px solid var(--pl-chrome-border, #D8CFB8)', flexShrink: 0 }}>
        <PearloomGlyph size={20} color="var(--pl-olive)" />
        <div style={{ display: 'flex', gap: 2, background: 'var(--pl-cream-deep, #F0E9D8)', borderRadius: 999, padding: 3 }}>
          {['Edit', 'Preview', 'Mobile'].map((m, i) => <span key={m} style={{ padding: '5px 14px', borderRadius: 999, fontSize: 12, fontWeight: i === 0 ? 600 : 500, background: i === 0 ? 'var(--pl-ink)' : 'transparent', color: i === 0 ? 'var(--pl-cream)' : 'var(--pl-ink-soft)' }}>{m}</span>)}
        </div>
        <span style={{ flex: 1 }} />
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11.5, color: 'var(--pl-olive)', fontFamily: mono }}><span style={{ width: 7, height: 7, borderRadius: 99, background: 'var(--pl-olive)' }} />Set just now</span>
        <Button variant="pearl" size="sm">Press publish <Pearl size={8} /></Button>
      </div>
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        {/* section rail */}
        <div style={{ width: 132, borderRight: '1px solid var(--pl-chrome-border, #D8CFB8)', padding: '12px 10px', display: 'flex', flexDirection: 'column', gap: 3, background: 'var(--pl-chrome-surface, #FBF7EE)', flexShrink: 0 }}>
          <div style={{ fontFamily: mono, fontSize: 8.5, letterSpacing: '0.14em', color: 'var(--pl-muted)', padding: '0 8px 6px' }}>PAGES</div>
          {SECTIONS.map(([g, l], i) => (
            <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '8px 10px', borderRadius: 9, background: i === 2 ? 'var(--peach-bg, #FBE8D6)' : 'transparent', color: 'var(--pl-ink)' }}>
              <span style={{ fontFamily: disp, fontSize: 13, color: i === 2 ? 'var(--peach-ink, #C6703D)' : 'var(--pl-muted)' }}>{g}</span>
              <span style={{ fontSize: 12.5, fontWeight: i === 2 ? 600 : 500 }}>{l}</span>
            </div>
          ))}
        </div>
        {/* canvas */}
        <div style={{ flex: 1, background: 'var(--pl-chrome-bg, #F5EFE2)', padding: 22, overflow: 'hidden', display: 'grid', placeItems: 'start center', backgroundImage: 'radial-gradient(circle, rgba(20,14,8,0.08) 1px, transparent 1px)', backgroundSize: '16px 16px' }}>
          <div style={{ width: '100%', maxWidth: 380, background: 'var(--pl-cream)', borderRadius: 8, boxShadow: 'var(--pl-shadow-md, 0 12px 32px rgba(40,28,12,0.12))', overflow: 'hidden' }}>
            <div style={{ height: 120, background: 'center/cover url(../../assets/imagery/vase-linen-still.png)' }} />
            <div style={{ padding: '16px 20px', textAlign: 'center' }}>
              <div style={{ fontFamily: disp, fontStyle: 'italic', fontSize: 26, color: 'var(--pl-ink)' }}>Mira & Jun</div>
              <div style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: '0.16em', color: 'var(--pl-muted)', marginTop: 4 }}>SEPT 6, 2026</div>
            </div>
            {/* selected block */}
            <div style={{ margin: '0 12px 12px', padding: 16, borderRadius: 8, border: '2px solid var(--peach-ink, #C6703D)', position: 'relative', background: 'var(--pl-cream-card)' }}>
              <span style={{ position: 'absolute', top: -10, left: 12, background: 'var(--peach-ink, #C6703D)', color: 'var(--pl-cream)', fontFamily: mono, fontSize: 8.5, letterSpacing: '0.1em', padding: '2px 8px', borderRadius: 5 }}>THE DAY · EDITING</span>
              <div style={{ fontFamily: disp, fontSize: 17, color: 'var(--pl-ink)', marginBottom: 8 }}>The day</div>
              {[['5:00', 'The ceremony'], ['6:30', 'Supper & toasts']].map(([t, l]) => (
                <div key={t} style={{ display: 'flex', gap: 10, fontSize: 12.5, color: 'var(--pl-ink-soft)', padding: '3px 0' }}><span style={{ fontFamily: mono, color: 'var(--pl-terra)' }}>{t}</span>{l}</div>
              ))}
            </div>
          </div>
        </div>
        {/* theme / property rail */}
        <div style={{ width: 210, borderLeft: '1px solid var(--pl-chrome-border, #D8CFB8)', padding: '16px 16px', background: 'var(--pl-chrome-surface, #FBF7EE)', flexShrink: 0, overflowY: 'auto' }}>
          <div style={{ fontFamily: disp, fontStyle: 'italic', fontSize: 16, color: 'var(--lavender-ink, #6B5A8C)', marginBottom: 14 }}>Theme</div>
          <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.14em', color: 'var(--pl-muted)', marginBottom: 8 }}>PALETTE</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginBottom: 18 }}>
            {[['Pressed Garden', ['#5C6B3F', '#D9A89E', '#FBF7EE', '#363F22'], true], ['First Light', ['#C6703D', '#F0C9A8', '#FDFAF0', '#3A2A1E'], false]].map(([n, cols, on]) => (
              <div key={n} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '6px 8px', borderRadius: 8, border: `1px solid ${on ? 'var(--peach-ink, #C6703D)' : 'transparent'}`, background: on ? 'var(--pl-cream)' : 'transparent' }}>
                <span style={{ display: 'flex', borderRadius: 4, overflow: 'hidden', border: '1px solid var(--pl-divider)' }}>{cols.map((c, j) => <span key={j} style={{ width: 13, height: 20, background: c }} />)}</span>
                <span style={{ fontSize: 11.5, color: 'var(--pl-ink)', fontWeight: on ? 600 : 400 }}>{n}</span>
              </div>
            ))}
          </div>
          <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: '0.14em', color: 'var(--pl-muted)', marginBottom: 8 }}>TYPE</div>
          <div style={{ background: 'var(--pl-cream)', border: '1px solid var(--pl-divider)', borderRadius: 8, padding: '10px 12px', marginBottom: 16 }}>
            <div style={{ fontFamily: disp, fontSize: 18, color: 'var(--pl-ink)' }}>Fraunces</div>
            <div style={{ fontFamily: body, fontSize: 11, color: 'var(--pl-muted)' }}>Geist · body</div>
          </div>
