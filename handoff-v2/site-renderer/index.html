<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pearloom — Site Renderer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Cormorant+Garamond:ital,wght@0,400..700;1,400..600&family=Inter:wght@400..800&family=Caveat:wght@400..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet">

    </g>

<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #E8E4DA; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* Anchor offset under the sticky nav. */
  [data-reveal] { scroll-margin-top: 96px; }

  /* ═══ ENTRANCE + LIVING MOTION ═══
     Baseline reveal runs in preview/published (root .pl-anim, added by
     JS only when NOT editing) so the editor canvas stays static. All of
     it sits under prefers-reduced-motion:no-preference, and a JS failsafe
     reveals everything if the observer never fires — so content is never
     stuck hidden (incl. capture engines that pause animations). */
  @media (prefers-reduced-motion: no-preference) {
    /* Baseline — every theme: sections thread in (fade + rise). */
    .pl8-guest.pl-anim [data-reveal] { opacity: 0; transform: translateY(24px); transition: opacity .75s cubic-bezier(.22,.61,.36,1), transform .75s cubic-bezier(.22,.61,.36,1); }
    .pl8-guest.pl-anim [data-reveal].pl-in { opacity: 1; transform: none; }

    /* Premium — hero title settles in like pressed ink. */
    .pl8-guest.pl-anim[data-pl-premium="on"] .pl8-hero-display { animation: pl-ink-settle 1.1s cubic-bezier(.2,.7,.3,1) both; }

    /* ── Animated DIVIDERS (Atelier) — only the chosen motion divider
         moves; static dividers stay still (mirrors the motion kits). ── */
    .pl8-guest[data-pl-premium="on"] .pl-da-flow .pl-da-gleam { animation: pl-gleam 2.6s linear infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-da-vine svg path { stroke-dasharray: 64; stroke-dashoffset: 64; animation: pl-vinedraw 3.4s ease-in-out infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-da-tide svg { animation: pl-tideflow 3.2s ease-in-out infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-da-twinkle .pl-da-star { animation: pl-twinkle 1.9s ease-in-out infinite; }

    /* ── Animated MOTIFS (Atelier) — only the chosen motion motif moves;
         static motifs stay still. ── */
    .pl8-guest[data-pl-premium="on"] .pl-ma { transform-box: fill-box; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-breeze { transform-origin: bottom center; animation: pl-sway 6s ease-in-out infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-sunbeam { transform-origin: center; animation: pl-sun 22s linear infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-tide { animation: pl-undulate 4s ease-in-out infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-bloom-open { transform-origin: center; animation: pl-breathe 6s ease-in-out infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-fireflies .pl-ff { animation: pl-firefly 3s ease-in-out infinite; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-fireflies .pl-ff1 { animation-delay: .5s; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-fireflies .pl-ff2 { animation-delay: 1s; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-fireflies .pl-ff3 { animation-delay: 1.5s; }
    .pl8-guest[data-pl-premium="on"] .pl-ma-fireflies .pl-ff4 { animation-delay: 2.1s; }
  }
  @keyframes pl-ink-settle { from { opacity: 0; transform: translateY(16px); filter: blur(6px); } to { opacity: 1; transform: none; filter: blur(0); } }
  @keyframes pl-sway { 0%,100% { transform: rotate(-2.4deg); } 50% { transform: rotate(2.4deg); } }
  @keyframes pl-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  @keyframes pl-sun { to { transform: rotate(360deg); } }
  @keyframes pl-undulate { 0%,100% { transform: translateX(-2px); } 50% { transform: translateX(2px); } }
  @keyframes pl-gleam { 0% { transform: translateX(-130%); } 100% { transform: translateX(360%); } }
  @keyframes pl-vinedraw { 0% { stroke-dashoffset: 64; } 55%,100% { stroke-dashoffset: 0; } }
  @keyframes pl-tideflow { 0%,100% { transform: translateX(-3px); } 50% { transform: translateX(3px); } }
  @keyframes pl-twinkle { 0%,100% { transform: rotate(45deg) scale(0.85); opacity: .65; } 50% { transform: rotate(45deg) scale(1.35); opacity: 1; } }
  @keyframes pl-firefly { 0%,100% { opacity: .18; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }

  /* Card hover lift (kit-agnostic baseline). */
  .pl8-card { transition: transform .2s cubic-bezier(.34,1.3,.64,1), box-shadow .2s ease; }
  .pl8-card:hover { transform: translateY(-3px); }

  /* ── Direct-edit affordances (editor canvas) ── */
  .pl-edit-on [data-pl-txt] { cursor: text; border-radius: 3px; transition: box-shadow .12s, background .12s; }
  .pl-edit-on [data-pl-txt]:hover { box-shadow: 0 0 0 1.5px rgba(193,154,75,0.6); background: rgba(193,154,75,0.09); }
  .pl-edit-on [data-pl-txt][contenteditable="true"] { box-shadow: 0 0 0 2px #5C6B3F; background: rgba(92,107,63,0.07); outline: none; cursor: text; }
  .pl-edit-on [data-screen-label]:hover > .pl-sec-handle { opacity: 1 !important; }
  .pl-sec-handle:active { cursor: grabbing; }

  /* ═══ PER-TEXTURE MATERIAL TREATMENTS — port of pearloom.css ═══
     data-pl-texture on the .pl8-guest root. Each is a material
     identity (paper grain / linen weave / watercolor bleed / velvet
     pile), painted as ::before/::after overlays that blend over the
     section colors beneath. */
  .pl8-guest[data-pl-texture="watercolor"],
  .pl8-guest[data-pl-texture="linen"],
  .pl8-guest[data-pl-texture="paper"],
  .pl8-guest[data-pl-texture="cotton"],
  .pl8-guest[data-pl-texture="silk"],
  .pl8-guest[data-pl-texture="marble"],
  .pl8-guest[data-pl-texture="washi"],
  .pl8-guest[data-pl-texture="slate"],
  .pl8-guest[data-pl-texture="tweed"],
  .pl8-guest[data-pl-texture="velvet"] { position: relative; isolation: isolate; }
  .pl8-guest[data-pl-texture="watercolor"] > *,
  .pl8-guest[data-pl-texture="linen"] > *,
  .pl8-guest[data-pl-texture="paper"] > *,
  .pl8-guest[data-pl-texture="cotton"] > *,
  .pl8-guest[data-pl-texture="silk"] > *,
  .pl8-guest[data-pl-texture="marble"] > *,
  .pl8-guest[data-pl-texture="washi"] > *,
  .pl8-guest[data-pl-texture="slate"] > *,
  .pl8-guest[data-pl-texture="tweed"] > *,
  .pl8-guest[data-pl-texture="velvet"] > * { position: relative; z-index: 2; }
  .pl8-guest[data-pl-texture="watercolor"]::before,
  .pl8-guest[data-pl-texture="linen"]::before,
  .pl8-guest[data-pl-texture="velvet"]::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100; }

  /* WATERCOLOR — 4 corner washes (multiply) + tooth. */
  .pl8-guest[data-pl-texture="watercolor"]::before {
    background-image:
      radial-gradient(60% 55% at 18% 22%, rgba(194,105,62,0.30) 0%, transparent 70%),
      radial-gradient(50% 60% at 82% 30%, rgba(138,154,107,0.34) 0%, transparent 72%),
      radial-gradient(48% 50% at 28% 80%, rgba(217,154,106,0.30) 0%, transparent 70%),
      radial-gradient(40% 42% at 72% 78%, rgba(201,154,78,0.26) 0%, transparent 68%);
    opacity: calc(0.7 * var(--pl-texture-intensity, 1));
    mix-blend-mode: multiply;
  }
  .pl8-guest[data-pl-texture="watercolor"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    background: var(--cream, transparent); filter: url(#t-weave);
    opacity: calc(0.20 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* LINEN — crossed warp/weft 1px stripes (overlay) + tooth. */
  .pl8-guest[data-pl-texture="linen"]::before {
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.13) 0 1px, transparent 1px 2px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.10) 0 1px, transparent 1px 2px);
    background-size: 2px 2px, 2px 2px;
    opacity: calc(0.5 * var(--pl-texture-intensity, 1)); mix-blend-mode: overlay;
  }
  .pl8-guest[data-pl-texture="linen"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-weave); background: var(--cream, transparent);
    opacity: calc(0.4 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* PAPER — weave tooth (soft-light) + mottle. */
  .pl8-guest[data-pl-texture="paper"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-weave); background: var(--cream, transparent);
    opacity: calc(0.30 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="paper"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    filter: url(#t-mottle); background: var(--cream, transparent);
    opacity: calc(0.16 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* COTTON — coarse mottle + heavier weave. */
  .pl8-guest[data-pl-texture="cotton"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-mottle); background: var(--cream, transparent);
    opacity: calc(0.34 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="cotton"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    filter: url(#t-weave); background: var(--cream, transparent);
    opacity: calc(0.42 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* VELVET — vertical pile stripes (soft-light) + diagonal sheen + mottle. */
  .pl8-guest[data-pl-texture="velvet"]::before {
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 3px),
      linear-gradient(118deg, transparent 28%, rgba(255,255,255,0.12) 50%, transparent 72%);
    background-size: 3px 100%, 100% 100%;
    opacity: calc(var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="velvet"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-mottle); background: var(--cream, transparent);
    opacity: calc(0.30 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* SILK — soft satin sheen: broad diagonal light bands. */
  .pl8-guest[data-pl-texture="silk"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    background-image:
      repeating-linear-gradient(122deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 9px),
      linear-gradient(122deg, transparent 20%, rgba(255,255,255,0.10) 38%, transparent 52%, rgba(255,255,255,0.07) 66%, transparent 84%);
    opacity: calc(0.7 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="silk"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    filter: url(#t-weave); background: var(--cream, transparent);
    opacity: calc(0.16 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* MARBLE — soft stone veining (turbulence) + one broad vein. */
  .pl8-guest[data-pl-texture="marble"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-vein); background: var(--cream, transparent);
    opacity: calc(0.5 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="marble"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    background-image:
      linear-gradient(118deg, transparent 30%, color-mix(in oklab, var(--ink, #000) 5%, transparent) 41%, transparent 44%),
      linear-gradient(96deg, transparent 58%, color-mix(in oklab, var(--ink, #000) 4%, transparent) 67%, transparent 70%);
    opacity: calc(0.6 * var(--pl-texture-intensity, 1)); mix-blend-mode: multiply;
  }

  /* WASHI — handmade paper: long fibers + sparse flecks. */
  .pl8-guest[data-pl-texture="washi"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-fiber); background: var(--cream, transparent);
    opacity: calc(0.42 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="washi"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    filter: url(#t-mottle); background: var(--cream, transparent);
    opacity: calc(0.12 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* SLATE — dense stone grain: heavy mottle + fine speckle. */
  .pl8-guest[data-pl-texture="slate"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: url(#t-mottle); background: var(--cream, transparent);
    opacity: calc(0.5 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }
  .pl8-guest[data-pl-texture="slate"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    filter: url(#t-weave); background: var(--cream, transparent);
    opacity: calc(0.22 * var(--pl-texture-intensity, 1)); mix-blend-mode: overlay;
  }

  /* TWEED — woven cross-hatch, heavier + diagonal slubs. */
  .pl8-guest[data-pl-texture="tweed"]::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
    background-image:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.10) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 3px);
    background-size: 4px 4px, 4px 4px;
    opacity: calc(0.55 * var(--pl-texture-intensity, 1)); mix-blend-mode: overlay;
  }
  .pl8-guest[data-pl-texture="tweed"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 101;
    filter: url(#t-mottle); background: var(--cream, transparent);
    opacity: calc(0.28 * var(--pl-texture-intensity, 1)); mix-blend-mode: soft-light;
  }

  /* ═══ COMPONENT KITS — port of pearloom.css [data-pl-kit] ═══
     The kit restyles every card/row (.pl8-detail-card, -schedule-row,
     -hotel-row, -faq-row, -countdown-cell). classic = no-op. */

  /* Kit contrast safety net — re-derive soft/muted ink from --t-ink. */
  .pl8-guest[data-pl-kit]:not([data-pl-kit="classic"]) .pl8-schedule-row,
  .pl8-guest[data-pl-kit]:not([data-pl-kit="classic"]) .pl8-hotel-row,
  .pl8-guest[data-pl-kit]:not([data-pl-kit="classic"]) .pl8-faq-row,
  .pl8-guest[data-pl-kit]:not([data-pl-kit="classic"]) .pl8-detail-card,
  .pl8-guest[data-pl-kit]:not([data-pl-kit="classic"]) .pl8-countdown-cell {
    color: var(--t-ink);
    --t-ink-soft: color-mix(in oklab, var(--t-ink) 78%, transparent);
    --t-ink-muted: color-mix(in oklab, var(--t-ink) 56%, transparent);
  }

  /* TICKET — perforated dashed stub. */
  .pl8-guest[data-pl-kit="ticket"] .pl8-schedule-row,
  .pl8-guest[data-pl-kit="ticket"] .pl8-hotel-row,
  .pl8-guest[data-pl-kit="ticket"] .pl8-faq-row,
  .pl8-guest[data-pl-kit="ticket"] .pl8-detail-card,
  .pl8-guest[data-pl-kit="ticket"] .pl8-countdown-cell {
    border: 1.5px dashed var(--t-ink-soft, #3A332C) !important;
    border-radius: 7px !important;
    background: var(--t-card, #FBF7EE) !important;
    color: var(--t-ink, #0E0D0B) !important;
    box-shadow: inset 1px 0 0 color-mix(in oklab, var(--t-ink, #0E0D0B) 6%, transparent), inset -1px 0 0 color-mix(in oklab, var(--t-ink, #0E0D0B) 6%, transparent) !important;
    position: relative;
  }

  /* PLATE — engraved double frame, square corners. */
  .pl8-guest[data-pl-kit="plate"] .pl8-schedule-row,
  .pl8-guest[data-pl-kit="plate"] .pl8-hotel-row,
  .pl8-guest[data-pl-kit="plate"] .pl8-faq-row,
  .pl8-guest[data-pl-kit="plate"] .pl8-detail-card,
  .pl8-guest[data-pl-kit="plate"] .pl8-countdown-cell {
    border-radius: 1px !important;
    background: var(--t-card, #FBF7EE) !important;
    color: var(--t-ink, #0E0D0B) !important;
    box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--t-ink, #0E0D0B) 45%, transparent), inset 0 0 0 4px var(--t-card, #FBF7EE), inset 0 0 0 5px color-mix(in oklab, var(--t-ink, #0E0D0B) 22%, transparent) !important;
    border: none !important;
  }

  /* SCRAPBOOK — taped polaroid, alternating tilt, tape strip. */
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-schedule-row,
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-hotel-row,
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-faq-row,
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-detail-card,
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-countdown-cell {
    background: #FFFDF7 !important; border: none !important; border-radius: 2px !important;
    box-shadow: 0 10px 22px rgba(0,0,0,0.12) !important; position: relative; padding-top: 24px !important;
    color: #2B2620 !important; --t-ink: #2B2620; --t-ink-soft: #5C544A; --t-ink-muted: #7A7167;
  }
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-schedule-row:nth-child(odd),
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-hotel-row:nth-child(odd) { transform: rotate(-1.4deg); }
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-schedule-row:nth-child(even),
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-hotel-row:nth-child(even) { transform: rotate(1.4deg); }
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-schedule-row::before,
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-hotel-row::before,
  .pl8-guest[data-pl-kit="scrapbook"] .pl8-faq-row::before {
    content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%) rotate(-3deg);
    width: 56px; height: 12px; background: color-mix(in oklab, var(--t-gold, #B8935A) 32%, transparent); z-index: 2;
  }

  /* INDEX — ruled index card, red margin + blue lines. */
  .pl8-guest[data-pl-kit="index"] .pl8-schedule-row,
  .pl8-guest[data-pl-kit="index"] .pl8-hotel-row,
  .pl8-guest[data-pl-kit="index"] .pl8-faq-row,
  .pl8-guest[data-pl-kit="index"] .pl8-detail-card,
  .pl8-guest[data-pl-kit="index"] .pl8-countdown-cell {
    background: #FBF7EE !important; border: none !important;
    border-left: 2px solid rgba(199,80,80,0.5) !important; border-radius: 2px !important;
    background-image: repeating-linear-gradient(180deg, transparent 0 21px, rgba(74,118,196,0.10) 21px 22px) !important;
    box-shadow: 0 1px 2px rgba(75,65,52,0.06) !important;
    color: #2B2620 !important; --t-ink: #2B2620; --t-ink-soft: #5C544A; --t-ink-muted: #7A7167;
  }

  /* MINIMAL — borderless, hairline rule only. */
  .pl8-guest[data-pl-kit="minimal"] .pl8-schedule-row,
  .pl8-guest[data-pl-kit="minimal"] .pl8-hotel-row,
  .pl8-guest[data-pl-kit="minimal"] .pl8-faq-row,
  .pl8-guest[data-pl-kit="minimal"] .pl8-detail-card,
  .pl8-guest[data-pl-kit="minimal"] .pl8-countdown-cell {
    background: transparent !important; border: none !important;
    border-bottom: 1px solid var(--t-line, #D8CFB8) !important; border-radius: 0 !important; box-shadow: none !important;
  }

  /* ARCH — arched-top cards. */
  .pl8-guest[data-pl-kit="arch"] .pl8-schedule-row,
  .pl8-guest[data-pl-kit="arch"] .pl8-hotel-row,
  .pl8-guest[data-pl-kit="arch"] .pl8-faq-row,
  .pl8-guest[data-pl-kit="arch"] .pl8-detail-card,
  .pl8-guest[data-pl-kit="arch"] .pl8-countdown-cell {
    background: var(--t-card, #FBF7EE) !important; color: var(--t-ink, #0E0D0B) !important;
    border: 1px solid var(--t-line, #D8CFB8) !important;
    border-radius: 24px 24px var(--t-radius, 8px) var(--t-radius, 8px) !important;
    box-shadow: 0 4px 16px rgba(40,28,12,0.06) !important;
  }
