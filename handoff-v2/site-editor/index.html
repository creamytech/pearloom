<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pearloom — Site Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Inter:wght@400..800&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#5C6B3F"/>
    <rect x="20" y="26" width="60" height="48" rx="4" fill="#FBF7EE"/>
    <rect x="20" y="26" width="16" height="48" fill="#E7E0D0"/>
    <circle cx="72" cy="34" r="3.4" fill="#C19A4B"/>
  </svg>
</template>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #E7E0D0; font-family: 'Inter', system-ui, sans-serif; color: #18181B; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #root { height: 100vh; }
  button { font-family: inherit; }
  .ed-scroll { scrollbar-width: thin; scrollbar-color: #D8CDB4 transparent; }
  .ed-scroll::-webkit-scrollbar { width: 9px; }
  .ed-scroll::-webkit-scrollbar-thumb { background: #D8CDB4; border-radius: 9px; border: 2px solid transparent; background-clip: content-box; }
  @keyframes ed-sheen { 0%{background-position:140% 0} 60%,100%{background-position:-40% 0} }
  @keyframes ed-pop { from{opacity:0; transform:translateY(8px) scale(.98)} to{opacity:1; transform:none} }
  .ed-pop { animation: ed-pop .18s cubic-bezier(.34,1.4,.64,1) both; }
  .ed-canvas-frame { transition: width .35s cubic-bezier(.65,0,.35,1); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../site-renderer/themes.js"></script>
<script type="text/babel" src="editor.jsx"></script>
</body>
</html>
