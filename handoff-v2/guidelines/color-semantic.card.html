<!-- @dsCard group="Colors" viewport="700x180" name="Semantic & specialty" subtitle="Plum destructive · terra warm · rose & stone" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); font-family: var(--pl-font-body); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 22px; }
  .sw { border-radius: var(--pl-radius-md); border: 1px solid var(--pl-divider); overflow: hidden; }
  .chip { height: 70px; }
  .meta { padding: 8px 10px; background: var(--pl-cream-card); }
  .name { font-size: 11.5px; font-weight: 600; color: var(--pl-ink); }
  .val { font-family: var(--pl-font-mono); font-size: 10px; color: var(--pl-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--pl-plum)"></div><div class="meta"><div class="name">Plum — destructive</div><div class="val">#C6563D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-terra)"></div><div class="meta"><div class="name">Terra — warm</div><div class="val">#C6703D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-warning)"></div><div class="meta"><div class="name">Warning</div><div class="val">#A14A2C</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-rose)"></div><div class="meta"><div class="name">Rose</div><div class="val">#D9A89E</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-stone)"></div><div class="meta"><div class="name">Stone</div><div class="val">#C8BFA5</div></div></div>
</div>
</body>
</html>
