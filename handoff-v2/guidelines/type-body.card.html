<!-- @dsCard group="Type" viewport="700x230" name="Body, mono & script" subtitle="Geist body · Geist Mono labels · Caveat script" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); }
  .wrap { padding: 24px 32px; display: flex; flex-direction: column; gap: 18px; }
  .lab { font-family: var(--pl-font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--pl-muted); margin-bottom: 6px; }
  .gold-rule { display:inline-block; width: 22px; height: 1px; background: var(--pl-gold); vertical-align: middle; margin-right: 10px; }
  .body { font-family: var(--pl-font-body); font-size: 16px; line-height: 1.6; color: var(--pl-ink); max-width: 560px; }
  .script { font-family: var(--pl-font-script); font-size: 30px; color: var(--pl-olive); }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="lab">Geist · body 16px</div>
    <p class="body">Answer three questions. Hand over a few photos. Pearloom drafts the whole site, then stays with you from save the date to a year later.</p>
  </div>
  <div>
    <div class="lab"><span class="gold-rule"></span>Geist Mono · editorial label</div>
  </div>
  <div>
    <div class="lab">Caveat · script — captions & notes</div>
    <p class="script">come as you are</p>
  </div>
</div>
</body>
</html>
