<!-- @dsCard group="Colors" viewport="700x180" name="Paper surfaces" subtitle="Cream ground · the three-layer chrome" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); font-family: var(--pl-font-body); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 22px; }
  .sw { border-radius: var(--pl-radius-md); border: 1px solid var(--pl-divider); overflow: hidden; }
  .chip { height: 70px; }
  .meta { padding: 8px 10px; background: var(--pl-cream-card); }
  .name { font-size: 11.5px; font-weight: 600; color: var(--pl-ink); }
  .val { font-family: var(--pl-font-mono); font-size: 10px; color: var(--pl-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--pl-cream)"></div><div class="meta"><div class="name">Cream — page</div><div class="val">#FDFAF0</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-cream-deep)"></div><div class="meta"><div class="name">Cream deep</div><div class="val">#F7F0E0</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-cream-card)"></div><div class="meta"><div class="name">Card</div><div class="val">#FBF7EE</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-divider)"></div><div class="meta"><div class="name">Divider</div><div class="val">#E2D9C3</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-muted)"></div><div class="meta"><div class="name">Muted text</div><div class="val">#6F6557</div></div></div>
</div>
</body>
</html>
