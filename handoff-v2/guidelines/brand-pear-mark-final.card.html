<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pearloom — Final mark</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream-deep); font-family: var(--pl-font-body); color: var(--pl-ink); }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 28px 60px; }
  .eyebrow { font-family: var(--pl-font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--pl-gold); }
  h1 { font-family: var(--pl-font-display); font-weight: 400; font-size: clamp(26px,3.4vw,38px); letter-spacing: -0.02em; margin: 10px 0 26px; }
  h1 em { font-style: italic; color: var(--pl-olive); }
  .stage { display: flex; align-items: stretch; gap: 22px; flex-wrap: wrap; }
  .chip { border-radius: 18px; padding: 26px; display: flex; flex-direction: column; align-items: center; gap: 14px; border: 1px solid var(--pl-divider); box-shadow: var(--pl-shadow-sm); }
  .chip svg { height: 150px; width: auto; display: block; }
  .lab { font-family: var(--pl-font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--pl-muted); }
  .sizes { display: flex; align-items: flex-end; gap: 22px; background: var(--pl-cream-card); border: 1px solid var(--pl-divider); border-radius: 18px; padding: 24px 28px; margin-top: 22px; }
  .sizes .s { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sizes svg { width: auto; display: block; }
  .pl-theme-toggle { position: fixed; bottom: 16px; right: 16px; z-index: 9000; display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 999px; border: 1px solid var(--pl-divider); background: var(--pl-glass); backdrop-filter: blur(12px); color: var(--pl-ink); font-family: var(--pl-font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; }
</style>
</head>
<body>
<button class="pl-theme-toggle" id="themeToggle">◐ <span id="themeLabel">Dark</span></button>
<div class="wrap">
  <div class="eyebrow">Brand · final mark</div>
  <h1>The pear, in <em>brand olive</em>.</h1>

    <div class="chip" style="background:var(--pl-olive)"><div id="m2"></div><div class="lab" style="color:rgba(255,255,255,0.7)">Knockout · cream on olive</div></div>
    <div class="chip" style="background:var(--pl-ink)"><div id="m3"></div><div class="lab" style="color:rgba(255,255,255,0.6)">Sage on ink</div></div>
    <div class="chip" style="background:var(--pl-gold)"><div id="m4"></div><div class="lab" style="color:rgba(40,28,12,0.6)">On gold</div></div>
  </div>
  <div class="sizes" id="sizes"></div>
</div>
