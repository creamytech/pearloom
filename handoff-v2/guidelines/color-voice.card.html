<!-- @dsCard group="Colors" viewport="700x180" name="Brand voice" subtitle="Olive is the voice · gold is the punctuation" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); font-family: var(--pl-font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 22px; }
  .sw { border-radius: var(--pl-radius-md); border: 1px solid var(--pl-divider); overflow: hidden; }
  .chip { height: 76px; }
  .meta { padding: 8px 10px; background: var(--pl-cream-card); }
  .name { font-size: 12px; font-weight: 600; color: var(--pl-ink); }
  .val { font-family: var(--pl-font-mono); font-size: 10px; color: var(--pl-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--pl-olive)"></div><div class="meta"><div class="name">Olive — primary</div><div class="val">#5C6B3F</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-olive-deep)"></div><div class="meta"><div class="name">Olive deep</div><div class="val">#363F22</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-gold)"></div><div class="meta"><div class="name">Gold — punctuation</div><div class="val">#C19A4B</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--pl-ink)"></div><div class="meta"><div class="name">Ink — type</div><div class="val">#18181B</div></div></div>
</div>
</body>
</html>
