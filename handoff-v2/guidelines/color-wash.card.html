<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); font-family: var(--pl-font-body); }
  .strip { display: flex; padding: 24px; gap: 0; }
  .cell { flex: 1; text-align: center; }
  .chip { height: 56px; background: var(--pl-cream-card); display: grid; place-items: center; }
  .fill { width: 100%; height: 100%; }
  .lab { font-family: var(--pl-font-mono); font-size: 10px; color: var(--pl-muted); margin-top: 8px; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="strip" id="s"></div>
<script>
  const steps = [5,8,10,12,15,20,30,40,50];
  document.getElementById('s').innerHTML = steps.map(n =>
    `<div class="cell"><div class="chip"><div class="fill" style="background:var(--pl-olive-${n})"></div></div><div class="lab">${n}%</div></div>`
  ).join('');
</script>
</body>
</html>
