<!-- @dsCard group="Spacing" viewport="700x200" name="Textures" subtitle="Pure-CSS paper & cloth grounds for theme packs" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--pl-cream); font-family: var(--pl-font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 22px 26px; }
  .t { border-radius: 12px; overflow: hidden; border: 1px solid var(--pl-divider); }
  .t .swatch { height: 68px; }
  .t .nm { font-family: var(--pl-font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--pl-muted); padding: 7px 9px; background: var(--pl-cream-card); }
</style>
</head>
<body>
<div class="grid" id="g"></div>
<script>
  var tx=[['laid','Laid paper'],['linen','Linen'],['dotwork','Dotwork'],['lattice','Lattice'],['scallop','Scallop'],['herringbone','Herringbone'],['starfield','Starfield'],['waveline','Waveline']];
  document.getElementById('g').innerHTML = tx.map(function(t){
    return '<div class="t"><div class="swatch pl-tx-'+t[0]+'"></div><div class="nm">'+t[1]+'</div></div>';
  }).join('');
</script>
</body>
</html>
