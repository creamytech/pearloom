<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pearloom — Live Site Preview</title>
  <link rel="stylesheet" href="shared/pearloom.css" />
  <link rel="stylesheet" href="shared/responsive.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <style> body { margin: 0; background: #E7E2D6; }
    /* ---- Mobile reflow: collapse multi-column section grids on small screens ---- */
    @media (max-width: 760px) {
      .pl-site [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      .pl-site [style*="repeat(2"], .pl-site [style*="repeat(3"], .pl-site [style*="repeat(4"], .pl-site [style*="repeat(6"] { grid-template-columns: 1fr 1fr !important; }
      .pl-site h1 { font-size: clamp(40px, 13vw, 72px) !important; }
      .pl-site [style*="padding: 56px"], .pl-site [style*="px 56px"], .pl-site [style*="px 72px"] { padding-left: 22px !important; padding-right: 22px !important; }
      .pl-site [style*="40px 56px"] { padding-left: 22px !important; padding-right: 22px !important; }
    }
    @media (max-width: 480px) {
      .pl-site [style*="repeat(2"], .pl-site [style*="repeat(3"], .pl-site [style*="repeat(4"], .pl-site [style*="repeat(6"] { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="shared/motifs.jsx"></script>
  <script type="text/babel" src="shared/themes.jsx"></script>
  <script type="text/babel" src="shared/kits.jsx"></script>
  <script type="text/babel" src="shared/site-config.jsx"></script>
  <script type="text/babel" src="shared/events.jsx"></script>
  <script src="shared/image-slot.js"></script>
  <script type="text/babel" src="pages/themed-site.jsx"></script>
  <script type="text/babel" src="pages/rsvp-flow.jsx"></script>
  <script type="text/babel" src="pages/live-preview.jsx"></script>
</body>
</html>
