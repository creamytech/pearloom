<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pearloom — Theme Store</title>
  <link rel="stylesheet" href="shared/pearloom.css" />
  <link rel="stylesheet" href="shared/responsive.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=Marcellus&family=Cinzel:wght@400;500;600&family=Italiana&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&family=Tenor+Sans&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Caveat:wght@500;600;700&family=Dancing+Script:wght@500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; }
    .store-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: filter 140ms ease, transform 140ms ease; }
    .store-btn:active { transform: scale(0.96); }
    .store-btn-ink { background: var(--ink); color: var(--cream); }
    .store-btn-sage { background: var(--sage-deep); color: var(--cream); }
    .store-btn-soft { background: var(--cream-2); color: var(--ink); border-color: var(--line); }
    .store-btn:hover { filter: brightness(1.06); }
    .store-btn-lg { display: inline-flex; align-items: center; gap: 7px; padding: 12px 20px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: filter 140ms ease, transform 140ms ease; white-space: nowrap; }
    .store-btn-lg:active { transform: scale(0.97); }
    .store-btn-lg.store-btn-ink { background: var(--ink); color: var(--cream); }
    .store-btn-lg.store-btn-sage { background: var(--sage-deep); color: var(--cream); }
    .store-btn-lg.store-btn-soft { background: var(--cream-2); color: var(--ink); border: 1px solid var(--line); }
    .store-btn-lg:hover { filter: brightness(1.06); }
    .lift { transition: transform 200ms cubic-bezier(0.16,1,0.3,1), box-shadow 200ms ease; }
    .lift:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(61,74,31,0.12); }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: rgba(61,74,31,0.18); border-radius: 999px; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(61,74,31,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="shared/motifs.jsx"></script>
  <script type="text/babel" src="shared/themes.jsx"></script>
  <script type="text/babel" src="shared/kits.jsx"></script>
  <script type="text/babel" src="shared/store-packs.jsx"></script>
  <script type="text/babel" src="pages/store.jsx"></script>
</body>
</html>
