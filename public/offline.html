<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pearloom — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #FAF7F2;
      color: #3D3530;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 440px;
    }

    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #A3B18A;
      margin-bottom: 2.5rem;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(163, 177, 138, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: #A3B18A;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #1A1A1A;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.65;
      color: #6B665F;
      margin-bottom: 1rem;
    }

    .card {
      background: white;
      border: 1px solid #E0D8CA;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-top: 1.5rem;
      text-align: left;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #A3B18A;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.88rem;
      margin-bottom: 0;
    }

    .retry-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.65rem 1.75rem;
      background: #A3B18A;
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: #8FA876;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">pearloom</div>

    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Don't worry — everything you've been working on is safe.
    </p>

    <div class="card">
      <div class="card-title">Your changes are saved</div>
      <p>
        Any edits you made are stored locally on this device and will
        sync automatically when you reconnect.
      </p>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      Try again
    </button>
  </div>
</body>
</html>
